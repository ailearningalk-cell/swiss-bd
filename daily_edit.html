<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Swiss-Bangla | Daily Edit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html { -webkit-text-size-adjust: 100%; }
body { -webkit-font-smoothing: antialiased; }

:root {
--primary:#4285f4;
--success:#34a853;
--danger:#ff4b2b;
--oxblood:#D40101;
--navy:#1a237e;
--bg:#fdfdfd;
--text-dark:#1a1f36;
--text-light:#697386;
--card-border:#e0e4e8;
--black:#1a1a1a;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
margin:0 auto;
}

/* HEADER (same as form.html) */

.company-name{
font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
font-weight:600;
color:var(--navy);
letter-spacing:-0.3px;
margin:0 0 8px 0;
line-height:1.2;
text-align:center;
white-space:nowrap;
overflow:visible;
text-overflow:clip;
font-size:clamp(18px,5vw,28px);
}

.weekly-title{
font-size:15px;
color:#D40101;
font-weight:700;
letter-spacing:0.3px;
line-height:1.2;
margin:0 0 5px 0;
text-align:center;
}

/* Dashboard link */

.dashboard-link{
text-align:center;
margin-bottom:20px;
}

.date-link{
color:var(--primary);
text-decoration:none;
font-size:13px;
font-weight:600;
display:inline-block;
padding:8px 16px;
background:#f0f2f5;
border-radius:20px;
transition:all .2s ease;
border:1px solid transparent;
}

.date-link:hover{
background:#e2e6ea;
transform:translateY(-1px);
}

.date-link:active{
transform:scale(.95);
}

/* MAIN CONTENT PLACEHOLDER */

.content-area{
width:100%;
max-width:500px;
}

.placeholder-card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 10px 20px rgba(0,0,0,.02);
border:1px solid var(--card-border);
text-align:center;
color:var(--text-light);
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="company-name">
Swiss-Bangla Trims & Accessories
</div>

<div class="weekly-title">
Daily Production Edit
</div>

</div>

<div class="dashboard-link">
<a href="home.html" class="date-link" id="dashboardDateLink">
📅 Loading...
</a>
</div>

<div class="content-area">

<div class="placeholder-card">
Daily edit interface will appear here.
</div>

</div>

<script>

/* Supabase connection (same as form page) */

const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
const supabaseKey = 'YOUR_SUPABASE_KEY';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);


/* Dhaka date helper */

function getDhakaDate(){
const now = new Date();
return new Date(now.getTime() + (6*60*60*1000));
}


/* Format display date */

function formatDisplayDate(date){

const day = date.getUTCDate();

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const month = monthNames[date.getUTCMonth()];

const year = date.getUTCFullYear();

return `${day} ${month} ${year}`;

}


/* Load date */

document.addEventListener('DOMContentLoaded',()=>{

const today = getDhakaDate();

document.getElementById('dashboardDateLink').innerHTML =
`📅 ${formatDisplayDate(today)}`;

});

</script>

</body>
</html>
