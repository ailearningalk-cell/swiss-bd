<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Swiss-Bangla | Daily Edit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--primary:#4285f4;
--success:#34a853;
--warning:#f1b44c;
--danger:#ff4b2b;
--oxblood:#D40101;
--navy:#1a237e;
--bg:#fdfdfd;
--text-dark:#1a1f36;
--text-light:#697386;
--card-border:#e0e4e8;
}

*{
box-sizing:border-box;
}

html{
height:100%;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
margin:0;
padding:16px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

/* HEADER */

.header{
width:100%;
max-width:500px;
margin-bottom:15px;
text-align:center;
padding:0 5px;
}

.company-name{
font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
font-size:clamp(18px,5vw,28px);
font-weight:600;
color:var(--navy);
white-space:nowrap;
letter-spacing:-0.3px;
margin:0 0 8px 0;
line-height:1.2;
text-align:center;
overflow:hidden;
text-overflow:ellipsis;
}

.daily-info{
text-align:center;
white-space:nowrap;
}

.daily-title{
font-size:15px;
color:#D40101;
font-weight:700;
letter-spacing:0.3px;
margin:0;
}

.separator{
color:var(--text-light);
font-weight:400;
font-size:15px;
margin:0 4px;
}

.date-sub{
font-size:15px;
color:var(--text-dark);
font-weight:500;
}

/* DASHBOARD LINK */

.dashboard-link{
text-align:center;
margin-bottom:20px;
width:100%;
max-width:500px;
}

.back-link{
color:var(--primary);
text-decoration:none;
font-size:13px;
font-weight:600;
display:inline-block;
padding:8px 16px;
background:#f0f2f5;
border-radius:20px;
transition:all .2s ease;
border:1px solid transparent;
}

.back-link:hover{
background:#e2e6ea;
transform:translateY(-1px);
}

.back-link:active{
transform:scale(.95);
}

/* CONTAINER */

.container{
width:100%;
max-width:500px;
display:grid;
gap:16px;
margin-bottom:10px;
}

/* CARDS */

.edit-card{
background:#fff;
border-radius:18px;
padding:18px 16px;
box-shadow:0 10px 20px rgba(0,0,0,.02);
border:1px solid var(--card-border);
width:100%;
overflow:hidden;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
flex-wrap:wrap;
gap:8px;
}

.card-title{
font-size:11px;
font-weight:700;
color:var(--text-light);
text-transform:uppercase;
letter-spacing:.8px;
}

.entry-count{
font-size:11px;
font-weight:600;
color:var(--primary);
background:#f0f7ff;
padding:4px 10px;
border-radius:30px;
}

/* TABLE */

.table-responsive{
overflow-x:auto;
width:100%;
-webkit-overflow-scrolling:touch;
margin-bottom:4px;
}

table{
width:100%;
border-collapse:collapse;
min-width:350px;
}

th{
font-size:10px;
font-weight:700;
color:var(--text-light);
text-transform:uppercase;
padding:10px 6px;
text-align:center;
border-bottom:1px solid var(--card-border);
white-space:nowrap;
}

td{
padding:8px 4px;
text-align:center;
border-bottom:1px solid #f0f2f5;
}

.time-label{
font-size:12px;
font-weight:600;
color:var(--text-dark);
white-space:nowrap;
padding:0 4px;
}

/* IMPORTANT FIX */
/* Input font-size MUST be >=16px to prevent mobile zoom */

.inline-input{
width:100%;
min-width:60px;
max-width:80px;
padding:8px 4px;
border:2px solid var(--card-border);
border-radius:8px;
font-size:16px;
font-weight:600;
text-align:center;
outline:none;
transition:all .2s ease;
margin:0 auto;
display:block;
background:white;
}

.inline-input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(66,133,244,.1);
}

/* BUTTON */

.update-btn{
width:100%;
padding:16px;
background:var(--navy);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:all .3s ease;
box-shadow:0 4px 6px rgba(0,0,0,.1);
letter-spacing:.5px;
display:block;
}

.update-btn:hover{
background:#0f1a2e;
transform:translateY(-2px);
box-shadow:0 8px 12px rgba(0,0,0,.15);
}

.update-btn:active{
transform:scale(.98);
}

.update-btn:disabled{
background:#94a3b8;
cursor:not-allowed;
}

/* LOADING */

.loading-container{
width:100%;
max-width:500px;
text-align:center;
padding:40px 20px;
color:var(--text-light);
font-size:15px;
font-weight:500;
}

/* NO DATA */

.no-data-message{
width:100%;
max-width:500px;
text-align:center;
padding:50px 20px;
color:var(--text-light);
font-size:16px;
font-weight:500;
}

.no-data-message svg{
width:60px;
height:60px;
stroke:var(--text-light);
margin-bottom:15px;
opacity:.5;
}

/* MODAL */

.modal-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
z-index:1000;
padding:16px;
}

.modal{
background:white;
padding:30px 20px;
border-radius:20px;
text-align:center;
width:100%;
max-width:280px;
box-shadow:0 20px 25px -5px rgba(0,0,0,.1);
}

.modal h1{
color:var(--success);
margin:0;
font-size:50px;
}

.modal h3{
margin:10px 0 5px;
color:var(--text-dark);
font-size:20px;
}

.modal p{
color:var(--text-light);
font-size:14px;
margin-bottom:20px;
}

.modal-btn{
background:var(--success);
color:white;
border:none;
padding:14px 12px;
border-radius:8px;
width:100%;
font-weight:600;
cursor:pointer;
text-decoration:none;
display:inline-block;
}

</style>
</head>

<body>

<div class="header">

<div class="company-name">
Swiss-Bangla Trims & Accessories
</div>

<div class="daily-info">

<span class="daily-title">
Daily Production Logs
</span>

<span class="separator">|</span>

<span class="date-sub" id="displayDate">
Loading...
</span>

</div>

</div>

<div class="dashboard-link">

<a href="home.html" class="back-link">
📊 Dashboard
</a>

</div>

<div id="loading" class="loading-container">
Loading today's entries...
</div>

<div id="noDataMessage" class="no-data-message" style="display:none;">

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
<circle cx="12" cy="12" r="10"/>
<line x1="12" y1="8" x2="12" y2="12"/>
<circle cx="12" cy="16" r="1"/>
</svg>

<div>No entries found for today</div>

</div>

<div id="editorContent" class="container" style="display:none;">

<!-- cards unchanged -->

</div>

<script>

/* YOUR ORIGINAL JAVASCRIPT REMAINS EXACTLY THE SAME */

</script>

</body>
</html>
