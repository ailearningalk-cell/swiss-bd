/* Dashboard link */

.back-link{

font-size:13px;
font-weight:600;

padding:8px 16px;

.back-link:hover{ background:#e2e6ea; transform:translateY(-1px);}

/* Modal (same as form.html) */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 16px;
  box-sizing: border-box;
}

.modal {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 100%;
  max-width: 280px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}

.modal h1 {
  color: var(--success);
  margin: 0;
  font-size: 50px;
}

.modal h3 {
  margin: 10px 0 5px;
  color: var(--text-dark);
  font-size: 20px;
}

.modal p {
  color: var(--text-light);
  font-size: 14px;
  margin-bottom: 20px;
}

.modal-btn {
  background: var(--success);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  width: 100%;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  box-sizing: border-box;
  transition: all 0.2s ease;
}

.modal-btn:hover {
  background: #2d9f5a;
  transform: translateY(-2px);
}

.modal-btn:active {
  transform: scale(0.98);
}

@media(max-width:360px){ .company-name{ font-size:20px; } }
</style>

  const month = monthNames[date.getUTCMonth()];
  const year = date.getUTCFullYear();
  return `${day} ${month} ${year}`;
}

  const month = String(date.getUTCMonth() + 1).padStart(2, '0');

  return `${year}-${month}-${day}`;
}
