<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Monthly Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --brand: #1a1f36;
            --primary: #4285f4;
            --success: #34a853;
            --oxblood: #D40101;
            --navy: #1a237e;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #e0e4e8;
            --whatsapp: #25D366;
            --email: #EA4335;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .company-name {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 600;
            color: var(--navy);
            white-space: nowrap;
            letter-spacing: -0.3px;
            margin: 0 0 8px 0;
            line-height: 1.2;
            text-align: center;
        }

        .monthly-title {
            font-size: 15px;
            color: #D40101;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            margin-bottom: 15px;
        }

        .dashboard-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            display: inline-block;
            padding: 8px 16px;
            background: #f0f2f5;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: #e2e6ea;
            transform: translateY(-1px);
        }

        .selector-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            padding: 20px;
        }

        .selector-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .month-nav-btn {
            background: #f0f2f5;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 600;
            color: var(--brand);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .month-nav-btn:active {
            background: var(--brand);
            color: white;
            transform: scale(0.95);
        }

        .month-display {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand);
            text-align: center;
        }

        .progress-container { 
            background: #f0f2f5; 
            height: 10px; 
            border-radius: 5px; 
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-bar { 
            background: var(--primary); 
            height: 100%; 
            width: 0%; 
            transition: width 0.6s ease; 
        }

        #progressText {
            font-size: 11px; 
            color: var(--text-light); 
            margin-top: 8px;
            text-align: center;
        }

        .stats-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 16px; 
        }
        
        .stat-card { 
            background: #fff; 
            padding: 18px; 
            border-radius: 18px; 
            border: 1px solid var(--card-border); 
        }
        
        .stat-label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-light); 
            text-transform: uppercase; 
        }
        
        .stat-val { 
            font-size: 22px; 
            font-weight: 800; 
            margin-top: 5px; 
            color: var(--brand); 
        }

        .table-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        
        .table-responsive { overflow-x: auto; width: 100%; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 450px; 
        }
        
        th { 
            background: #fcfdfe; 
            padding: 12px; 
            text-align: left; 
            font-size: 10px; 
            font-weight: 700; 
            color: var(--text-light);
            border-bottom: 1px solid var(--card-border); 
            text-transform: uppercase;
        }
        
        td { 
            padding: 14px 12px; 
            font-size: 13px; 
            border-bottom: 1px solid #f8f9fb; 
            color: var(--text-dark); 
        }
        
        .row-total { 
            font-weight: 800; 
            color: var(--primary); 
            text-align: right; 
        }

        .action-buttons {
            width: 100%;
            display: flex;
            gap: 12px;
            margin-top: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn-pdf {
            background: var(--brand); 
            color: white; 
            border: none;
            padding: 14px 28px; 
            border-radius: 30px; 
            font-weight: 600;
            cursor: pointer; 
            font-size: 16px; 
            flex: 1;
            min-width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-pdf:hover {
            background: #2a2f46;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .btn-pdf:active { 
            transform: scale(0.98); 
        }

        .btn-pdf:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-share {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-share.active {
            background: var(--success);
            opacity: 1;
            pointer-events: auto;
        }

        .btn-share.active:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .btn-share.active:active {
            transform: scale(0.98);
        }

        .share-menu {
            display: none;
            width: 100%;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .share-menu.active {
            display: flex;
        }

        .share-option {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            text-align: center;
        }

        .share-option.whatsapp {
            background: var(--whatsapp);
        }

        .share-option.email {
            background: var(--email);
        }

        .share-option.other {
            background: var(--brand);
        }

        .share-option:hover {
            transform: translateY(-2px);
            filter: brightness(110%);
        }

        .share-option:active {
            transform: translateY(0);
        }

        .loading { 
            padding: 40px; 
            text-align: center; 
            color: var(--text-light); 
            font-size: 13px; 
        }

        .pdf-status {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        .pdf-status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .pdf-status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="company-name">Swiss-Bangla Trims & Accessories</div>
        <div class="monthly-title">Monthly Data</div>
        
        <div class="dashboard-link">
            <a href="home.html" class="back-link">📊 Dashboard</a>
        </div>

        <div class="selector-card">
            <span class="selector-label">Viewing Report For</span>
            
            <div class="month-selector">
                <button class="month-nav-btn" onclick="changeMonth(-1)">←</button>
                <div class="month-display" id="monthDisplay"></div>
                <button class="month-nav-btn" onclick="changeMonth(1)">→</button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="progressText"></div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Month Total</span>
                <div id="month_total" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Avg</span>
                <div id="month_avg" class="stat-val" style="color: var(--success)">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table id="monthlyTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Twill</th>
                            <th>Draw</th>
                            <th>Croc</th>
                            <th>Tip</th>
                            <th>Starch</th>
                            <th style="text-align: right;">FG Output</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader" class="loading">Loading monthly data...</div>
        </div>

        <!-- PDF Generation Status -->
        <div id="pdfStatus" class="pdf-status" style="display: none;"></div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-pdf" onclick="generatePDF()" id="pdfBtn">📄 Download PDF</button>
            <button class="btn-share" id="shareBtn" onclick="toggleShareMenu()">📤 Share PDF</button>
        </div>

        <!-- Share Options Menu -->
        <div class="share-menu" id="shareMenu">
            <button class="share-option whatsapp" onclick="shareViaWhatsApp()">📱 WhatsApp</button>
            <button class="share-option email" onclick="shareViaEmail()">📧 Email</button>
            <button class="share-option other" onclick="shareViaOther()">🔄 More Apps</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let monthOffset = 0;
        let currentData = [];
        let columnTotals = {
            twill: 0,
            draw: 0,
            crochet: 0,
            tip: 0,
            starch: 0,
            fg: 0
        };
        let lastGeneratedPdfBlob = null;
        let lastGeneratedFileName = '';

        function isAndroid() {
            return navigator.userAgent.toLowerCase().indexOf('android') > -1;
        }

        function formatMonthYear(date) {
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            return `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        }

        function getMonthRange(offset) {
            const now = new Date();
            const selectedDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth();
            const firstDay = `${year}-${String(month + 1).padStart(2, '0')}-01`;
            const lastDay = new Date(year, month + 1, 0).toISOString().split('T')[0];
            
            return {
                year,
                month,
                firstDay,
                lastDay,
                displayDate: selectedDate
            };
        }

        function updateMonthDisplayAndFetch() {
            const range = getMonthRange(monthOffset);
            document.getElementById('monthDisplay').innerText = formatMonthYear(range.displayDate);
            fetchMonthlyData(range.firstDay, range.lastDay);
        }

        function changeMonth(direction) {
            monthOffset += direction;
            updateMonthDisplayAndFetch();
        }

        async function fetchMonthlyData(firstDay, lastDay) {
            document.getElementById('loader').style.display = "block";
            document.getElementById('tableBody').innerHTML = "";
            document.getElementById('pdfStatus').style.display = "none";
            
            // Reset share button state
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.classList.remove('active');
            shareBtn.style.opacity = '0.5';
            shareBtn.style.pointerEvents = 'none';
            
            // Reset totals
            columnTotals = {
                twill: 0,
                draw: 0,
                crochet: 0,
                tip: 0,
                starch: 0,
                fg: 0
            };
            
            try {
                const { data, error } = await _supabase.from('production_logs').select('*')
                    .gte('entry_date', firstDay).lte('entry_date', lastDay)
                    .order('entry_date', { ascending: false });

                if (!error) {
                    currentData = data;
                    processData(data);
                }
            } catch (err) { console.error(err); }
        }

        function processData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loader').style.display = "none";
            let grandTotal = 0;
            const grouped = {};

            data.forEach(row => {
                const d = row.entry_date;
                if (!grouped[d]) grouped[d] = { twill:0, ds:0, crochet:0, tip:0, starch:0, fg:0 };
                
                const twill = (Number(row.twill_6_1) || 0) + (Number(row.twill_6_2) || 0) + (Number(row.twill_10_2) || 0);
                const draw = (Number(row.ds_16h_1) || 0) + (Number(row.ds_16h_2) || 0) + (Number(row.ds_48h_3) || 0);
                const crochet = (Number(row.crochet_1) || 0) + (Number(row.crochet_2) || 0) + (Number(row.crochet_3) || 0);
                const tip = (Number(row.tipping) || 0);
                const starch = (Number(row.starching) || 0);
                const fg = (Number(row.finished_goods) || 0);
                
                grouped[d].twill += twill;
                grouped[d].ds += draw;
                grouped[d].crochet += crochet;
                grouped[d].tip += tip;
                grouped[d].starch += starch;
                grouped[d].fg += fg;
                
                // Add to totals
                columnTotals.twill += twill;
                columnTotals.draw += draw;
                columnTotals.crochet += crochet;
                columnTotals.tip += tip;
                columnTotals.starch += starch;
                columnTotals.fg += fg;
                
                grandTotal += fg;
            });

            const keys = Object.keys(grouped).sort().reverse();
            
            // Add data rows
            keys.forEach(date => {
                const day = grouped[date];
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${new Date(date).getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date(date).getMonth()]}</b></td>
                        <td>${day.twill.toLocaleString()}</td>
                        <td>${day.ds.toLocaleString()}</td>
                        <td>${day.crochet.toLocaleString()}</td>
                        <td>${day.tip.toLocaleString()}</td>
                        <td>${day.starch.toLocaleString()}</td>
                        <td class="row-total">${day.fg.toLocaleString()}</td>
                    </tr>
                `;
            });
            
            // Add summary row with totals
            tableBody.innerHTML += `
                <tr style="background-color: #f0f2f5; font-weight: 800; border-top: 2px solid #1a1f36;">
                    <td><b>TOTAL</b></td>
                    <td><b>${columnTotals.twill.toLocaleString()}</b></td>
                    <td><b>${columnTotals.draw.toLocaleString()}</b></td>
                    <td><b>${columnTotals.crochet.toLocaleString()}</b></td>
                    <td><b>${columnTotals.tip.toLocaleString()}</b></td>
                    <td><b>${columnTotals.starch.toLocaleString()}</b></td>
                    <td class="row-total" style="color: var(--primary);"><b>${columnTotals.fg.toLocaleString()}</b></td>
                </tr>
            `;

            document.getElementById('month_total').innerText = grandTotal.toLocaleString();
            document.getElementById('month_avg').innerText = Math.round(grandTotal / (keys.length || 1)).toLocaleString();
            
            const goal = 500000;
            const percentage = Math.min((grandTotal / goal) * 100, 100);
            document.getElementById('progressBar').style.width = percentage + "%";
            
            document.getElementById('progressText').innerText = keys.length > 0 ? `${keys.length} days recorded` : "No records for this month";
        }

        function generatePDF() {
            const btn = document.getElementById('pdfBtn');
            const originalText = btn.innerText;
            const statusDiv = document.getElementById('pdfStatus');
            
            btn.innerText = "⏳ Generating PDF...";
            btn.disabled = true;
            statusDiv.style.display = "none";

            try {
                const { jsPDF } = window.jspdf;
                
                // Create PDF
                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'pt',
                    format: 'a4'
                });
                
                // Add title - CENTERED
                doc.setFontSize(16);
                doc.setTextColor(26, 31, 54);
                doc.setFont(undefined, 'bold');
                
                // Center align the title
                const title = 'Swiss-Bangla Trims & Accessories';
                const titleWidth = doc.getTextWidth(title);
                const pageWidth = doc.internal.pageSize.getWidth();
                doc.text(title, (pageWidth - titleWidth) / 2, 40);
                
                // Add subtitle - CENTERED
                doc.setFontSize(14);
                doc.setTextColor(212, 1, 1);
                doc.setFont(undefined, 'bold');
                
                const range = getMonthRange(monthOffset);
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                const monthName = monthNames[range.month];
                const subtitle = `${monthName} ${range.year} Production Report`;
                const subtitleWidth = doc.getTextWidth(subtitle);
                doc.text(subtitle, (pageWidth - subtitleWidth) / 2, 60);
                
                // Generate table - the HTML now includes the summary row
                doc.autoTable({ 
                    html: '#monthlyTable', 
                    startY: 80, 
                    headStyles: { fillColor: [26, 31, 54] },
                    styles: { fontSize: 9, cellPadding: 8 },
                    margin: { left: 40, right: 40 }
                });
                
                // Generate filename
                lastGeneratedFileName = `Monthly_Report_${range.year}_${String(range.month + 1).padStart(2, '0')}.pdf`;
                
                // Get PDF as blob for sharing
                const pdfBlob = doc.output('blob');
                lastGeneratedPdfBlob = pdfBlob;
                
                // Get PDF as base64 for Android
                const pdfBase64 = doc.output('datauristring');
                
                // Send to Android via JavaScript interface
                if (window.AndroidPDF) {
                    window.AndroidPDF.savePDF(pdfBase64, lastGeneratedFileName);
                    
                    // Show success message
                    statusDiv.className = 'pdf-status success';
                    statusDiv.innerHTML = '✓ PDF saved successfully! You can now share it.';
                    statusDiv.style.display = 'block';
                    
                    // Enable share button
                    const shareBtn = document.getElementById('shareBtn');
                    shareBtn.classList.add('active');
                    shareBtn.style.opacity = '1';
                    shareBtn.style.pointerEvents = 'auto';
                    
                } else {
                    // Fallback for browser
                    const blobUrl = URL.createObjectURL(pdfBlob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = lastGeneratedFileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // For browser, we can use Web Share API
                    if (navigator.share) {
                        statusDiv.className = 'pdf-status success';
                        statusDiv.innerHTML = '✓ PDF generated! Click Share to send it.';
                        statusDiv.style.display = 'block';
                        
                        const shareBtn = document.getElementById('shareBtn');
                        shareBtn.classList.add('active');
                        shareBtn.style.opacity = '1';
                        shareBtn.style.pointerEvents = 'auto';
                    }
                }
                
                btn.innerText = "✓ PDF Generated";
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 2000);
                
                btn.disabled = false;
                
            } catch (error) {
                console.error('PDF generation error:', error);
                statusDiv.className = 'pdf-status error';
                statusDiv.innerHTML = '❌ PDF generation failed. Please try again.';
                statusDiv.style.display = 'block';
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function toggleShareMenu() {
            const menu = document.getElementById('shareMenu');
            menu.classList.toggle('active');
        }

        async function shareViaWhatsApp() {
            if (!lastGeneratedPdfBlob) {
                alert('Please generate PDF first');
                return;
            }

            try {
                const range = getMonthRange(monthOffset);
                const monthName = formatMonthYear(range.displayDate);
                
                // For Android, we'll use the JavaScript interface
                if (window.AndroidPDF) {
                    // Create a download URL and message for the user
                    const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                    
                    // Show instructions
                    alert('Please follow these steps:\n1. Download the PDF\n2. Open WhatsApp\n3. Attach the PDF from Downloads/SBTA_Reports folder');
                    
                    // Download the file
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = lastGeneratedFileName;
                    link.click();
                    
                    // Open WhatsApp (this might work on some devices)
                    setTimeout(() => {
                        window.location.href = 'https://wa.me/?text=' + encodeURIComponent(`Monthly Production Report - ${monthName}`);
                    }, 1000);
                    
                } else {
                    // For browser, use Web Share API
                    const pdfFile = new File([lastGeneratedPdfBlob], lastGeneratedFileName, { type: 'application/pdf' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
                        await navigator.share({
                            title: 'Monthly Production Report',
                            text: `Monthly Production Report - ${monthName}`,
                            files: [pdfFile]
                        });
                    } else {
                        // Fallback
                        const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                        const link = document.createElement('a');
                        link.href = blobUrl;
                        link.download = lastGeneratedFileName;
                        link.click();
                        alert('PDF downloaded. Please share it manually via WhatsApp.');
                    }
                }
            } catch (error) {
                console.error('WhatsApp share error:', error);
                alert('Could not share via WhatsApp. PDF has been downloaded.');
                const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = lastGeneratedFileName;
                link.click();
            }
            
            document.getElementById('shareMenu').classList.remove('active');
        }

        async function shareViaEmail() {
            if (!lastGeneratedPdfBlob) {
                alert('Please generate PDF first');
                return;
            }

            try {
                const range = getMonthRange(monthOffset);
                const monthName = formatMonthYear(range.displayDate);
                
                const subject = `Monthly Production Report - ${monthName}`;
                const body = `Dear Team,\n\nPlease find attached the monthly production report for ${monthName}.\n\nSummary:\n- Month Total: ${columnTotals.fg.toLocaleString()}\n- Total Days: ${Object.keys(currentData).length}\n\nBest regards,\nSBTA System`;
                
                if (window.AndroidPDF) {
                    // Download first, then open email
                    const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                    
                    alert('Please follow these steps:\n1. Download the PDF\n2. Open your email app\n3. Attach the PDF from Downloads/SBTA_Reports folder');
                    
                    // Download the file
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = lastGeneratedFileName;
                    link.click();
                    
                    // Open email client
                    setTimeout(() => {
                        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                    }, 1000);
                    
                } else {
                    // For browser
                    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                    
                    // Also trigger download
                    setTimeout(() => {
                        const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                        const link = document.createElement('a');
                        link.href = blobUrl;
                        link.download = lastGeneratedFileName;
                        link.click();
                    }, 500);
                }
                
            } catch (error) {
                console.error('Email error:', error);
                alert('Could not open email. PDF has been downloaded.');
                const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = lastGeneratedFileName;
                link.click();
            }
            
            document.getElementById('shareMenu').classList.remove('active');
        }

        async function shareViaOther() {
            if (!lastGeneratedPdfBlob) {
                alert('Please generate PDF first');
                return;
            }

            try {
                if (window.AndroidPDF) {
                    // Download the file for manual sharing
                    const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                    
                    alert('PDF downloaded to Downloads/SBTA_Reports folder. You can now share it using any app.');
                    
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = lastGeneratedFileName;
                    link.click();
                    
                } else {
                    // For browser, use Web Share API
                    const pdfFile = new File([lastGeneratedPdfBlob], lastGeneratedFileName, { type: 'application/pdf' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
                        await navigator.share({
                            title: 'Monthly Production Report',
                            files: [pdfFile]
                        });
                    } else {
                        // Fallback
                        const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                        const link = document.createElement('a');
                        link.href = blobUrl;
                        link.download = lastGeneratedFileName;
                        link.click();
                        alert('PDF downloaded. You can now share it from your Downloads folder.');
                    }
                }
            } catch (error) {
                console.error('Share error:', error);
                alert('Could not share. PDF has been downloaded.');
                const blobUrl = URL.createObjectURL(lastGeneratedPdfBlob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = lastGeneratedFileName;
                link.click();
            }
            
            document.getElementById('shareMenu').classList.remove('active');
        }

        // Initialize with current month
        window.onload = () => {
            monthOffset = 0;
            updateMonthDisplayAndFetch();
        };
    </script>
</body>
</html>
