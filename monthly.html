<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Monthly Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Use CDN that works better on mobile -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --brand: #1a1f36;
            --primary: #4285f4;
            --success: #34a853;
            --oxblood: #D40101;
            --navy: #1a237e;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #e0e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* Company name - same as home.html */
        .company-name {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 600;
            color: var(--navy);
            white-space: nowrap;
            letter-spacing: -0.3px;
            margin: 0 0 8px 0;
            line-height: 1.2;
            text-align: center;
        }

        /* Monthly Data title - same color as Live Production */
        .monthly-title {
            font-size: 15px;
            color: #D40101;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Dashboard link below the title */
        .dashboard-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            display: inline-block;
            padding: 5px 12px;
            background: #f0f2f5;
            border-radius: 20px;
        }

        .uniform-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            height: 120px; 
            display: flex; flex-direction: column; justify-content: center;
            padding: 25px; box-sizing: border-box;
        }

        .month-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 8px; }
        
        /* Styled Month Selector */
        .month-select {
            font-size: 18px; font-weight: 800; color: var(--brand);
            border: none; background: transparent; cursor: pointer;
            padding: 0; margin-bottom: 15px; outline: none;
        }

        .progress-container { background: #f0f2f5; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.6s ease; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 18px; border-radius: 18px; border: 1px solid var(--card-border); }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 800; margin-top: 5px; color: var(--brand); }

        .table-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { 
            background: #fcfdfe; padding: 12px; text-align: left; 
            font-size: 10px; font-weight: 700; color: var(--text-light);
            border-bottom: 1px solid var(--card-border); text-transform: uppercase;
        }
        td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid #f8f9fb; color: var(--text-dark); }
        .row-total { font-weight: 800; color: var(--primary); text-align: right; }

        /* Footer with left-aligned Download PDF button */
        .footer-actions { 
            width: 100%; 
            display: flex; 
            justify-content: flex-start;
            padding-bottom: 40px; 
            margin-top: 10px;
        }
        
        .btn-pdf {
            background: var(--brand); 
            color: white; 
            border: none;
            padding: 14px 28px; 
            border-radius: 30px; 
            font-weight: 600;
            cursor: pointer; 
            font-size: 16px; 
            width: auto;
            min-width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .btn-pdf:active { 
            transform: scale(0.98); 
            background: #2a2f46; 
        }

        .loading { padding: 40px; text-align: center; color: var(--text-light); font-size: 13px; }

        /* Progress text styling */
        #progressText {
            font-size: 11px; 
            color: var(--text-light); 
            margin-top: 8px;
        }

        /* Hidden iframe for WebView download */
        #pdfIframe {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Swiss-Bangla Title - same as home.html -->
        <div class="company-name">Swiss-Bangla Trims & Accessories</div>
        
        <!-- Monthly Data title - same color as Live Production -->
        <div class="monthly-title">Monthly Data</div>
        
        <!-- Dashboard link below the title -->
        <div class="dashboard-link">
            <a href="home.html" class="back-link">📊 Dashboard</a>
        </div>

        <div class="uniform-card">
            <span class="month-label">Viewing Report For</span>
            <input type="month" id="monthPicker" class="month-select" onchange="fetchMonthlyData()">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="progressText" style="font-size: 11px; color: var(--text-light); margin-top: 8px;"></p>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Month Total</span>
                <div id="month_total" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Avg</span>
                <div id="month_avg" class="stat-val" style="color: var(--success)">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table id="monthlyTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Twill</th>
                            <th>Draw</th>
                            <th>Croc</th>
                            <th>Tip</th>
                            <th>Starch</th>
                            <th style="text-align: right;">FG Output</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader" class="loading">Loading monthly data...</div>
        </div>

        <!-- Left-aligned Download PDF button -->
        <div class="footer-actions">
            <button class="btn-pdf" onclick="generatePDF()"> Download PDF</button>
        </div>
    </div>

    <!-- Hidden iframe for WebView download -->
    <iframe id="pdfIframe" style="display: none;"></iframe>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Set default picker to current month
        const picker = document.getElementById('monthPicker');
        const now = new Date();
        picker.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function fetchMonthlyData() {
            document.getElementById('loader').style.display = "block";
            document.getElementById('tableBody').innerHTML = "";
            
            const selected = picker.value.split('-');
            const year = selected[0];
            const month = selected[1];
            
            const firstDay = `${year}-${month}-01`;
            const lastDay = new Date(year, month, 0).toISOString().split('T')[0];

            try {
                const { data, error } = await _supabase.from('production_logs').select('*')
                    .gte('entry_date', firstDay).lte('entry_date', lastDay)
                    .order('entry_date', { ascending: false });

                if (!error) processData(data);
            } catch (err) { console.error(err); }
        }

        function processData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loader').style.display = "none";
            let grandTotal = 0;
            const grouped = {};

            data.forEach(row => {
                const d = row.entry_date;
                if (!grouped[d]) grouped[d] = { twill:0, ds:0, crochet:0, tip:0, starch:0, fg:0 };
                grouped[d].twill += (Number(row.twill_6_1) || 0) + (Number(row.twill_6_2) || 0) + (Number(row.twill_10_2) || 0);
                grouped[d].ds += (Number(row.ds_16h_1) || 0) + (Number(row.ds_16h_2) || 0) + (Number(row.ds_48h_3) || 0);
                grouped[d].crochet += (Number(row.crochet_1) || 0) + (Number(row.crochet_2) || 0) + (Number(row.crochet_3) || 0);
                grouped[d].tip += (Number(row.tipping) || 0);
                grouped[d].starch += (Number(row.starching) || 0);
                grouped[d].fg += (Number(row.finished_goods) || 0);
                grandTotal += (Number(row.finished_goods) || 0);
            });

            const keys = Object.keys(grouped).sort().reverse();
            keys.forEach(date => {
                const day = grouped[date];
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${new Date(date).getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date(date).getMonth()]}</b></td>
                        <td>${day.twill.toLocaleString()}</td>
                        <td>${day.ds.toLocaleString()}</td>
                        <td>${day.crochet.toLocaleString()}</td>
                        <td>${day.tip.toLocaleString()}</td>
                        <td>${day.starch.toLocaleString()}</td>
                        <td class="row-total">${day.fg.toLocaleString()}</td>
                    </tr>
                `;
            });

            document.getElementById('month_total').innerText = grandTotal.toLocaleString();
            document.getElementById('month_avg').innerText = Math.round(grandTotal / (keys.length || 1)).toLocaleString();
            
            const goal = 500000;
            const percentage = Math.min((grandTotal / goal) * 100, 100);
            document.getElementById('progressBar').style.width = percentage + "%";
            
            document.getElementById('progressText').innerText = keys.length > 0 ? `${keys.length} days recorded` : "No records for this month";
        }

        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf;
                
                // Create PDF
                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'pt',
                    format: 'a4'
                });
                
                // Add title
                doc.setFontSize(16);
                doc.setTextColor(26, 31, 54);
                doc.text('Swiss-Bangla Trims & Accessories', 40, 40);
                
                doc.setFontSize(12);
                doc.setTextColor(212, 1, 1);
                
                // Format month for display
                const selectedMonth = picker.value;
                const [year, month] = selectedMonth.split('-');
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                const monthName = monthNames[parseInt(month) - 1];
                
                doc.text(`${monthName} ${year} Production Report`, 40, 60);
                
                // Generate table
                doc.autoTable({ 
                    html: '#monthlyTable', 
                    startY: 80, 
                    headStyles: { fillColor: [26, 31, 54] },
                    styles: { fontSize: 9, cellPadding: 8 },
                    margin: { left: 40, right: 40 }
                });
                
                // Convert PDF to data URL
                const pdfData = doc.output('dataurlstring');
                
                // Method 1: Try to open in new window (works in browser)
                const pdfWindow = window.open();
                if (pdfWindow) {
                    pdfWindow.location.href = pdfData;
                } else {
                    // Method 2: If popup blocked, use iframe (works in WebView/APK)
                    const iframe = document.getElementById('pdfIframe');
                    iframe.src = pdfData;
                    iframe.style.display = 'block';
                    iframe.style.width = '100%';
                    iframe.style.height = '600px';
                    
                    // Optional: Add a close button or message
                    alert('PDF loaded below. You can view and save it from there.');
                }
                
                // Method 3: Also try download as fallback
                // doc.save(`Monthly_Report_${selectedMonth}.pdf`);
                
            } catch (error) {
                console.error('PDF generation error:', error);
                alert('Unable to generate PDF. Please try again.');
            }
        }

        window.onload = fetchMonthlyData;
    </script>
</body>
</html>
