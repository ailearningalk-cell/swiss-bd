<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla Trims & Accessories | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
        }

        /* --- Cinematic Video Background --- */
        .video-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .video-background video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(25%) contrast(120%) grayscale(30%);
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.1) 0%, 
                rgba(0,0,0,0.4) 50%, 
                rgba(0,0,0,0.9) 100%);
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 6vw, 58px);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: fadeInScale 2s ease-out forwards;
        }

        .tagline {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #ff4b2b; /* Industrial Red */
            margin-top: 12px;
            opacity: 0;
            font-weight: 500;
            animation: fadeIn 2s ease forwards 1s;
        }

        /* --- Mechanical Pulse Needle & Track --- */
        .sewing-track {
            width: 320px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 80px auto 40px auto;
            position: relative;
        }

        .stitch-progress {
            position: absolute;
            left: 0; top: 0; height: 100%; width: 0%;
            background: repeating-linear-gradient(90deg, 
                #ff4b2b, #ff4b2b 4px, 
                transparent 4px, transparent 8px);
            animation: stitchEffect 4s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        /* The Metallic Mechanical Needle */
        .pulse-needle {
            position: absolute;
            top: -48px;
            left: 0%;
            width: 3px;
            height: 50px;
            background: linear-gradient(to right, #7f8c8d, #ffffff, #bdc3c7);
            border-radius: 2px;
            z-index: 20;
            animation: needleTravel 4s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        /* The Glowing Tip */
        .pulse-needle::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #ff4b2b;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4b2b, 0 0 20px rgba(255, 75, 43, 0.6);
            animation: tipPulse 0.3s infinite alternate;
        }

        /* Top cap of the needle */
        .pulse-needle::before {
            content: '';
            position: absolute;
            top: 0; left: -1px; width: 5px; height: 2px;
            background: #95a5a6;
        }

        /* --- Loading Footer --- */
        .loader-info {
            margin-top: 20px;
            text-align: center;
        }

        .progress-bar {
            width: 200px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            animation: fillBar 5s linear forwards;
        }

        .loading-text {
            font-size: 8px;
            color: #555;
            margin-top: 12px;
            letter-spacing: 4px;
            font-weight: 700;
        }

        /* --- Animations --- */
        @keyframes needleTravel {
            0% { left: 0%; transform: translateY(0); }
            5% { transform: translateY(-8px); }
            10% { transform: translateY(0); }
            15% { transform: translateY(-8px); }
            20% { transform: translateY(0); }
            25% { transform: translateY(-8px); }
            30% { transform: translateY(0); }
            35% { transform: translateY(-8px); }
            40% { transform: translateY(0); }
            45% { transform: translateY(-8px); }
            50% { transform: translateY(0); }
            55% { transform: translateY(-8px); }
            60% { transform: translateY(0); }
            65% { transform: translateY(-8px); }
            70% { transform: translateY(0); }
            75% { transform: translateY(-8px); }
            80% { transform: translateY(0); }
            85% { transform: translateY(-8px); }
            90% { transform: translateY(0); }
            100% { left: 100%; transform: translateY(0); }
        }

        @keyframes tipPulse {
            from { transform: translateX(-50%) scale(0.7); opacity: 0.6; }
            to { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        @keyframes stitchEffect { to { width: 100%; } }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fillBar { to { width: 100%; } }

    </style>
</head>
<body>

    <div class="video-background">
        <div class="video-overlay"></div>
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-sewing-machine-needle-in-action-14285-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <div class="brand-name">Swiss-Bangla Trims & Accessories</div>
        <div class="tagline">Smart Production Monitoring</div>

        <div class="sewing-track">
            <div class="stitch-progress"></div>
            <div class="pulse-needle"></div>
        </div>

        <div class="loader-info">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loading-text">Loading</p>
        </div>
    </div>

    <script>
        // Smooth transition to home.html after 5 seconds
        setTimeout(() => {
            window.location.href = "home.html";
        }, 5000);
    </script>
</body>
</html>
