<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Swiss-Bangla Trims | Welcome</title>

<!-- Load font and force it before display -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

/* BODY */
body, html {
  height:100%; width:100%;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(145deg,#0a0a0a 0%,#1a1a1a 100%);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* PRELOAD HIDDEN TITLE */
#brandName {
  font-weight:600;
  color:#fff;
  font-size:clamp(20px,4.5vw,26px);
  line-height:1.2;
  letter-spacing:.3px;
  white-space:nowrap;
  opacity:0; /* hide until font is loaded */
}

/* TAGLINE */
#tagline {
  font-size:10px;
  color:#ff4b2b;
  text-transform:uppercase;
  letter-spacing:3px;
  margin-top:12px;
  font-weight:500;
  opacity:0;
}

/* SEWING TRACK */
.sewing-track {
  width:280px; max-width:85%; height:2px;
  background:rgba(255,255,255,0.1); margin:35px auto; position:relative;
  opacity:0;
}
.stitch-progress {
  position:absolute; left:0; top:0; height:100%; width:0%;
  background: repeating-linear-gradient(90deg,#ff4b2b,#ff4b2b 4px,transparent 4px,transparent 8px);
  transition: width 3.5s linear;
}
.stitch-progress.run { width:100%; }
.pulse-needle {
  position:absolute; top:-30px; left:0; width:2px; height:30px;
  background:linear-gradient(to bottom,#ff4b2b,#ffffff);
  border-radius:1px; transition:left 3.5s linear;
}
.pulse-needle.move { left:calc(100% - 2px); }
.pulse-needle::after {
  content:''; position:absolute; bottom:-3px; left:50%;
  transform:translateX(-50%); width:6px; height:6px; background:#ff4b2b;
  border-radius:50%; box-shadow:0 0 10px #ff4b2b;
}

/* LOADER */
.loader-simple { margin-top:20px; text-align:center; opacity:0; }
.loader-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#fff; margin:0 3px; opacity:.3; animation:dotPulse 1.5s infinite; }
.loader-dot:nth-child(2){animation-delay:.5s;}
.loader-dot:nth-child(3){animation-delay:1s;}
@keyframes dotPulse{0%,100%{opacity:.3; transform:scale(1);}50%{opacity:1; transform:scale(1.2); background:#ff4b2b}}
.loading-text-simple{font-size:8px;color:#888;margin-top:12px;letter-spacing:2px;}
.progress-simple { width:140px; height:1px; background:rgba(255,255,255,0.1); margin:10px auto; overflow:hidden;}
.progress-simple-fill { height:100%; width:0%; background:#ff4b2b; transition:width 3.5s linear;}
.progress-simple-fill.run { width:100%; }

</style>
</head>
<body>

<div id="brandName">Swiss-Bangla Trims & Accessories</div>
<div id="tagline">Smart Production Monitoring</div>

<div class="sewing-track" id="track">
  <div class="stitch-progress" id="stitch"></div>
  <div class="pulse-needle" id="needle"></div>
</div>

<div class="loader-simple" id="loader">
  <div class="progress-simple"><div class="progress-simple-fill" id="progress"></div></div>
  <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
  <div class="loading-text-simple">LOADING</div>
</div>

<script>
// Ensure font is fully loaded before showing title
document.fonts.ready.then(() => {
  document.getElementById("brandName").style.opacity = 1;
  document.getElementById("tagline").style.opacity = 1;
  document.getElementById("track").style.opacity = 1;
  document.getElementById("loader").style.opacity = 1;

  // Start animations
  document.getElementById("stitch").classList.add("run");
  document.getElementById("needle").classList.add("move");
  document.getElementById("progress").classList.add("run");

  // Redirect after animation finishes
  setTimeout(()=>{ window.location.href="home.html"; }, 4600);
});
</script>

</body>
</html>
