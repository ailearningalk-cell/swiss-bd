<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla Trims | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
        }

        /* --- Cinematic Video Background --- */
        .video-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .video-background video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(25%) contrast(110%);
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            padding: 0 5vw; /* Side padding relative to screen width */
            text-align: center;
        }

        /* --- Responsive Brand Name (One Line Guarantee) --- */
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            /* Using vw ensures it shrinks exactly with the screen width */
            font-size: clamp(14px, 4.8vw, 48px); 
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInScale 1.5s ease-out forwards;
            line-height: 1.2;
            width: 100%;
            white-space: nowrap; /* Forces one line on all devices */
        }

        /* Balanced Ampersand */
        .brand-name span {
            font-size: 0.95em; /* Increased from 0.85em */
            color: #ffffff;
            margin: 0 4px;
        }

        .tagline {
            font-size: clamp(10px, 2vw, 15px);
            text-transform: uppercase;
            letter-spacing: clamp(3px, 0.8vw, 8px);
            color: #ff4b2b;
            margin-top: clamp(10px, 3vh, 20px);
            opacity: 0;
            font-weight: 600;
            animation: fadeIn 2s ease forwards 0.8s;
        }

        /* --- Sewing Track --- */
        .sewing-track {
            width: 60%; 
            max-width: 400px; 
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: clamp(40px, 8vh, 60px) auto;
            position: relative;
        }

        .stitch-progress {
            position: absolute;
            left: 0; top: 0; height: 100%; width: 0%;
            background: repeating-linear-gradient(90deg, 
                #ff4b2b, #ff4b2b 4px, 
                transparent 4px, transparent 8px);
            animation: stitchEffect 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .pulse-needle {
            position: absolute;
            top: -40px;
            left: 0%;
            width: 2px;
            height: 42px;
            background: linear-gradient(to bottom, transparent, #ffffff);
            z-index: 20;
            animation: needleTravel 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .pulse-needle::after {
            content: '';
            position: absolute;
            bottom: -3px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: #ff4b2b;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff4b2b;
            animation: tipPulse 0.4s infinite alternate;
        }

        /* --- Loader Info --- */
        .loader-info {
            margin-top: 10px;
        }

        .progress-bar {
            width: clamp(120px, 20vw, 180px);
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            margin: 0 auto 15px auto;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            animation: fillBar 5s linear forwards;
        }

        .loading-text {
            font-size: clamp(9px, 1.2vw, 11px);
            color: #bbb;
            letter-spacing: 3px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- Animations --- */
        @keyframes needleTravel {
            0% { left: 0%; transform: translateY(0); }
            5%, 15%, 25%, 35%, 45%, 55%, 65%, 75%, 85%, 95% { transform: translateY(-6px); }
            10%, 20%, 30%, 40%, 50%, 60%, 70%, 80%, 90% { transform: translateY(0); }
            100% { left: 100%; transform: translateY(0); }
        }

        @keyframes tipPulse {
            from { transform: translateX(-50%) scale(0.8); }
            to { transform: translateX(-50%) scale(1.2); }
        }

        @keyframes stitchEffect { to { width: 100%; } }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fillBar { to { width: 100%; } }

    </style>
</head>
<body>

    <div class="video-background">
        <div class="video-overlay"></div>
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-sewing-machine-needle-in-action-14285-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <h1 class="brand-name">Swiss-Bangla Trims <span>&</span> Accessories</h1>
        <div class="tagline">Smart Production Monitoring</div>

        <div class="sewing-track">
            <div class="stitch-progress"></div>
            <div class="pulse-needle"></div>
        </div>

        <div class="loader-info">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loading-text">Connecting to Dashboard</p>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "home.html";
        }, 5000);
    </script>
</body>
</html>
