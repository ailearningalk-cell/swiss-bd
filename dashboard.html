<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Production Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --warning: #fbbc04;
            --bg: #f0f2f5;
            --text-dark: #1a1f36;
            --text-light: #697386;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header {
            width: 100%; max-width: 500px;
            margin-bottom: 25px; text-align: center;
        }

        .header h1 { font-size: 26px; margin: 0; color: var(--text-dark); letter-spacing: -0.5px; }
        .date-sub { font-size: 14px; color: var(--text-light); font-weight: 500; }

        .container {
            width: 100%; max-width: 500px;
            display: grid; gap: 16px;
        }

        .metric-card {
            background: #fff; border-radius: 14px;
            padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e4e8;
        }

        .label-small {
            font-size: 11px; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block;
        }

        .number-large {
            font-size: 38px; font-weight: 800; color: var(--text-dark);
            line-height: 1; display: block; margin-bottom: 18px;
        }

        .sub-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding-top: 15px; border-top: 1px solid #f1f4f8;
        }

        .sub-item { display: flex; flex-direction: column; }
        .sub-label { font-size: 9px; color: var(--text-light); margin-bottom: 2px; font-weight: 600; }
        .sub-number { font-size: 15px; font-weight: 700; color: var(--text-dark); }

        .accent-card { background: var(--text-dark); color: white; border: none; }
        .accent-card .label-small, .accent-card .sub-label { color: #a1aab9; }
        .accent-card .number-large, .accent-card .sub-number { color: white; }

        .status-tag {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: rgba(52, 168, 83, 0.1); color: var(--success); font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--text-light); font-family: sans-serif; margin-top: 15px;">Fetching Real-time Stats...</p>
    </div>

    <div class="header">
        <span class="date-sub" id="displayDate">Syncing...</span>
        <h1>Live Production</h1>
    </div>

    <div class="container">
        <div class="metric-card">
            <span class="label-small">Twill Tape <span class="status-tag">Live</span></span>
            <span class="number-large" style="color: var(--primary)" id="total_twill">0</span>
            <div class="sub-grid">
                <div class="sub-item"><span class="sub-label">6-1</span><span class="sub-number" id="v_t61">0</span></div>
                <div class="sub-item"><span class="sub-label">6-2</span><span class="sub-number" id="v_t62">0</span></div>
                <div class="sub-item"><span class="sub-label">10-2</span><span class="sub-number" id="v_t102">0</span></div>
            </div>
        </div>

        <div class="metric-card">
            <span class="label-small">Drawstring</span>
            <span class="number-large" style="color: var(--success)" id="total_ds">0</span>
            <div class="sub-grid">
                <div class="sub-item"><span class="sub-label">16H-1</span><span class="sub-number" id="v_ds1">0</span></div>
                <div class="sub-item"><span class="sub-label">16H-2</span><span class="sub-number" id="v_ds2">0</span></div>
                <div class="sub-item"><span class="sub-label">48H-3</span><span class="sub-number" id="v_ds3">0</span></div>
            </div>
        </div>

        <div class="metric-card">
            <span class="label-small">Crochet</span>
            <span class="number-large" style="color: var(--warning)" id="total_c">0</span>
            <div class="sub-grid">
                <div class="sub-item"><span class="sub-label">C-1</span><span class="sub-number" id="v_c1">0</span></div>
                <div class="sub-item"><span class="sub-label">C-2</span><span class="sub-number" id="v_c2">0</span></div>
                <div class="sub-item"><span class="sub-label">C-3</span><span class="sub-number" id="v_c3">0</span></div>
            </div>
        </div>

        <div class="metric-card accent-card">
            <span class="label-small">Daily Output Summary</span>
            <span class="number-large" id="v_fg">0</span>
            <div class="sub-grid">
                <div class="sub-item"><span class="sub-label">Tipping</span><span class="sub-number" id="v_tip">0</span></div>
                <div class="sub-item"><span class="sub-label">Starching</span><span class="sub-number" id="v_starch">0</span></div>
                <div class="sub-item"><span class="sub-label">Update</span><span class="sub-number" style="font-size:10px" id="lastTime">--:--</span></div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchDailyTotals() {
            // Get today's date in YYYY-MM-DD format
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric'});

            try {
                // Query: Select all rows where entry_date is today
                const { data, error } = await _supabase
                    .from('production_logs')
                    .select('*')
                    .eq('entry_date', today);

                if (error) throw error;

                // Process the data (Summing up the columns)
                let totals = {
                    t61: 0, t62: 0, t102: 0,
                    ds1: 0, ds2: 0, ds3: 0,
                    c1: 0, c2: 0, c3: 0,
                    tip: 0, starch: 0, fg: 0
                };

                data.forEach(row => {
                    totals.t61 += (row.twill_6_1 || 0);
                    totals.t62 += (row.twill_6_2 || 0);
                    totals.t102 += (row.twill_10_2 || 0);
                    totals.ds1 += (row.ds_16h_1 || 0);
                    totals.ds2 += (row.ds_16h_2 || 0);
                    totals.ds3 += (row.ds_48h_3 || 0);
                    totals.c1 += (row.crochet_1 || 0);
                    totals.c2 += (row.crochet_2 || 0);
                    totals.c3 += (row.crochet_3 || 0);
                    totals.tip += (row.tipping || 0);
                    totals.starch += (row.starching || 0);
                    totals.fg += (row.finished_goods || 0);
                });

                // Update UI
                updateDisplay(totals);

                // Hide loader on first load
                const loader = document.getElementById('loader');
                if (loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }

                // Update Last Sync Time
                const now = new Date();
                document.getElementById('lastTime').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

            } catch (err) {
                console.error("Dashboard Error:", err);
                document.getElementById('displayDate').innerText = "Connection Error";
            }
        }

        function updateDisplay(t) {
            // Twill
            document.getElementById('v_t61').innerText = t.t61.toLocaleString();
            document.getElementById('v_t62').innerText = t.t62.toLocaleString();
            document.getElementById('v_t102').innerText = t.t102.toLocaleString();
            document.getElementById('total_twill').innerText = (t.t61 + t.t62 + t.t102).toLocaleString();

            // Drawstring
            document.getElementById('v_ds1').innerText = t.ds1.toLocaleString();
            document.getElementById('v_ds2').innerText = t.ds2.toLocaleString();
            document.getElementById('v_ds3').innerText = t.ds3.toLocaleString();
            document.getElementById('total_ds').innerText = (t.ds1 + t.ds2 + t.ds3).toLocaleString();

            // Crochet
            document.getElementById('v_c1').innerText = t.c1.toLocaleString();
            document.getElementById('v_c2').innerText = t.c2.toLocaleString();
            document.getElementById('v_c3').innerText = t.c3.toLocaleString();
            document.getElementById('total_c').innerText = (t.c1 + t.c2 + t.c3).toLocaleString();

            // Others
            document.getElementById('v_tip').innerText = t.tip.toLocaleString();
            document.getElementById('v_starch').innerText = t.starch.toLocaleString();
            document.getElementById('v_fg').innerText = t.fg.toLocaleString();
        }

        // Initial Load
        window.onload = fetchDailyTotals;

        // Auto Refresh every 30 seconds
        setInterval(fetchDailyTotals, 30000);
    </script>
</body>
</html>
