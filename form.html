<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Swiss-Bangla | Entry Form</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html { -webkit-text-size-adjust: 100%; }
body { -webkit-font-smoothing: antialiased; }

:root {
  --primary:#4285f4; --success:#34a853; --danger:#ff4b2b; --oxblood:#D40101;
  --navy:#1a237e; --bg:#fdfdfd; --text-dark:#1a1f36; --text-light:#697386; --card-border:#e0e4e8; --black:#1a1a1a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{width:100%;max-width:500px;margin:0 auto;}

.company-name {
    font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: -0.3px;
    margin: 0 0 8px 0;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    overflow: visible;
    text-overflow: clip;
    font-size: clamp(18px, 5vw, 28px);
}

.weekly-title{
font-size:15px;
color:#D40101;
font-weight:700;
letter-spacing:0.3px;
line-height:1.2;
margin:0 0 5px 0;
text-align:center;
}

.dashboard-link{ text-align:center; margin-bottom:20px; }
.back-link{
color:var(--primary);
text-decoration:none;
font-size:13px;
font-weight:600;
display:inline-block;
padding:8px 16px;
background:#f0f2f5;
border-radius:20px;
transition:all .2s ease;
border:1px solid transparent;
}
.back-link:hover{ background:#e2e6ea; transform:translateY(-1px);}
.back-link:active{ transform:scale(.95);}

/* --- Cards & Form --- */
.cards-container{ width:100%; display:grid; gap:16px; margin-bottom:20px; }
.category-card{
background:#fff; border-radius:18px; padding:22px;
box-shadow:0 10px 20px rgba(0,0,0,.02);
border:1px solid var(--card-border);
}
.card-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
.card-title{font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.8px;}
.form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:16px;}
.input-group{display:flex; flex-direction:column;}
.input-group label{font-size:10px; font-weight:700; color:var(--text-light); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;}
.input-group input{
width:100%; padding:12px; border:2px solid var(--card-border); border-radius:12px;
font-size:16px; font-weight:600; text-align:center; outline:none; transition:all .2s ease; background:white;
}
.input-group input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(66,133,244,.1); }

.submit-btn{
width:100%; padding:16px 20px; background:#1a1a1a; color:white;
border:none; border-radius:12px; font-size:16px; font-weight:600;
cursor:pointer; margin:10px 0 0 0; transition:all .3s ease; box-shadow:0 4px 6px rgba(0,0,0,.1); letter-spacing:.5px;
}
.submit-btn:hover{ background:#000; transform:translateY(-2px); box-shadow:0 8px 12px rgba(0,0,0,.2);}
.submit-btn:active{ transform:scale(.98); box-shadow:0 2px 4px rgba(0,0,0,.1);}
.submit-btn:disabled{ background:#666; cursor:not-allowed; transform:none; box-shadow:none;}

.error-box{display:none; color:var(--danger); font-size:13px; font-weight:600; text-align:center; margin-top:15px; padding:12px; background:#fff5f5; border-radius:12px; border:1px solid #fed7d7;}

/* --- Modal (restored) --- */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 16px;
  box-sizing: border-box;
}

.modal {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 100%;
  max-width: 280px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}

.modal h1 {
  color: var(--success);
  margin: 0;
  font-size: 50px;
}

.modal h3 {
  margin: 10px 0 5px;
  color: var(--text-dark);
  font-size: 20px;
}

.modal p {
  color: var(--text-light);
  font-size: 14px;
  margin-bottom: 20px;
}

.modal-btn {
  background: var(--success);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  width: 100%;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  box-sizing: border-box;
  transition: all 0.2s ease;
}

.modal-btn:hover {
  background: #2d9f5a;
  transform: translateY(-2px);
}

.modal-btn:active {
  transform: scale(0.98);
}

@media(max-width:360px){ .company-name{ font-size:20px; } }
</style>
</head>
<body>

<div class="container">
  <div class="company-name">Swiss-Bangla Trims & Accessories</div>
  <div class="weekly-title">Add Production Entry</div>
</div>

<div class="dashboard-link">
  <a href="home.html" class="back-link">⬅ Back to Dashboard</a>
</div>

<div class="container cards-container">
  <!-- Twill Tape Card -->
  <div class="category-card">
    <div class="card-header">
      <span class="card-title">Twill Tape Items</span>
    </div>
    <div class="form-grid">
      <div class="input-group"><label>(6)-1</label><input type="number" id="t61" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>(6)-2</label><input type="number" id="t62" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>(10)-2</label><input type="number" id="t102" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
    </div>
  </div>

  <!-- Drawstring Card -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Drawstring Items</span></div>
    <div class="form-grid">
      <div class="input-group"><label>16H-1</label><input type="number" id="ds1" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>16H-2</label><input type="number" id="ds2" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>48H-3</label><input type="number" id="ds3" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
    </div>
  </div>

  <!-- Crochet Card -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Crochet Items</span></div>
    <div class="form-grid">
      <div class="input-group"><label>C-1</label><input type="number" id="c1" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>C-2</label><input type="number" id="c2" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>C-3</label><input type="number" id="c3" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
    </div>
  </div>

  <!-- Finishing Card -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Finishing & Output</span></div>
    <div class="form-grid">
      <div class="input-group"><label>Tipping</label><input type="number" id="tip" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>Starching</label><input type="number" id="starch" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
      <div class="input-group"><label>F. Goods</label><input type="number" id="fg" value="0" min="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
    </div>
  </div>
</div>

<div class="container">
  <button class="submit-btn" id="submitBtn">⚡ Final Submit</button>
</div>
<div class="error-box" id="errorBox"></div>

<!-- Success Modal (restored) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h1>✅</h1>
    <h3>Data Saved!</h3>
    <p>Production logged successfully.</p>
    <a href="home.html" class="modal-btn">Go to Dashboard</a>
  </div>
</div>

<script>
const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// Dhaka time helper
function getDhakaDate() {
  const now = new Date();
  return new Date(now.getTime() + (6 * 60 * 60 * 1000));
}

// Focus/blur helpers for zero values
function hFocus(input) {
  if (input.value === "0") input.value = "";
  document.getElementById('errorBox').style.display = "none";
}

function hBlur(input) {
  if (input.value === "") input.value = "0";
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  // Collect values
  const t61 = Number(document.getElementById('t61').value) || 0;
  const t62 = Number(document.getElementById('t62').value) || 0;
  const t102 = Number(document.getElementById('t102').value) || 0;
  const ds1 = Number(document.getElementById('ds1').value) || 0;
  const ds2 = Number(document.getElementById('ds2').value) || 0;
  const ds3 = Number(document.getElementById('ds3').value) || 0;
  const c1 = Number(document.getElementById('c1').value) || 0;
  const c2 = Number(document.getElementById('c2').value) || 0;
  const c3 = Number(document.getElementById('c3').value) || 0;
  const tip = Number(document.getElementById('tip').value) || 0;
  const starch = Number(document.getElementById('starch').value) || 0;
  const fg = Number(document.getElementById('fg').value) || 0;

  const total = t61 + t62 + t102 + ds1 + ds2 + ds3 + c1 + c2 + c3 + tip + starch + fg;
  if (total === 0) {
    errorBox.innerText = '⚠️ Please enter at least one production value.';
    errorBox.style.display = 'block';
    return;
  }

  const data = {
    entry_date: getDhakaDate().toISOString().split('T')[0],
    twill_6_1: t61,
    twill_6_2: t62,
    twill_10_2: t102,
    ds_16h_1: ds1,
    ds_16h_2: ds2,
    ds_48h_3: ds3,
    crochet_1: c1,
    crochet_2: c2,
    crochet_3: c3,
    tipping: tip,
    starching: starch,
    finished_goods: fg
  };

  btn.disabled = true;
  btn.innerText = '⏳ Syncing...';

  try {
    const { error } = await _supabase.from('production_logs').insert([data]);
    if (error) throw error;

    // Show success modal instead of alert
    document.getElementById('modalOverlay').style.display = 'flex';
    // Reset form fields
    document.getElementById('t61').value = 0;
    document.getElementById('t62').value = 0;
    document.getElementById('t102').value = 0;
    document.getElementById('ds1').value = 0;
    document.getElementById('ds2').value = 0;
    document.getElementById('ds3').value = 0;
    document.getElementById('c1').value = 0;
    document.getElementById('c2').value = 0;
    document.getElementById('c3').value = 0;
    document.getElementById('tip').value = 0;
    document.getElementById('starch').value = 0;
    document.getElementById('fg').value = 0;
    btn.disabled = false;
    btn.innerText = '⚡ Final Submit';

  } catch (e) {
    errorBox.innerText = e.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.innerText = '⚡ Final Submit';
  }
});
</script>
</body>
</html>
