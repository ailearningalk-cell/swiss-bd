<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Swiss-Bangla | Entry Form</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
--primary:#4285f4;
--success:#34a853;
--danger:#ff4b2b;
--oxblood:#D40101;
--navy:#1a237e;
--bg:#fdfdfd;
--text-dark:#1a1f36;
--text-light:#697386;
--card-border:#e0e4e8;
--black:#1a1a1a;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:var(--bg);
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
}

/* -------- HEADER (STABLE) -------- */

.company-name{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
font-size:clamp(18px,5vw,28px);
font-weight:600;
color:var(--navy);
white-space:nowrap;
letter-spacing:-0.3px;
margin:0 0 8px 0;
text-align:center;

/* 🔒 LAYOUT LOCK (prevents jump) */
line-height:1.2;
min-height:1.2em;
}

.weekly-title{
font-size:15px;
color:#D40101;
font-weight:700;
letter-spacing:0.3px;
margin:0 0 5px 0;
text-align:center;

/* 🔒 LAYOUT LOCK */
line-height:1.2;
min-height:1.2em;
}

/* -------- Dashboard link -------- */

.dashboard-link{
text-align:center;
margin-bottom:20px;
}

.back-link{
color:var(--primary);
text-decoration:none;
font-size:13px;
font-weight:600;
display:inline-block;
padding:8px 16px;
background:#f0f2f5;
border-radius:20px;
transition:all .2s ease;
border:1px solid transparent;
}

.back-link:hover{
background:#e2e6ea;
transform:translateY(-1px);
}

.back-link:active{
transform:scale(.95);
}

/* -------- Cards -------- */

.cards-container{
width:100%;
display:grid;
gap:16px;
margin-bottom:20px;
}

.category-card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 10px 20px rgba(0,0,0,.02);
border:1px solid var(--card-border);
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.card-title{
font-size:11px;
font-weight:700;
color:var(--text-light);
text-transform:uppercase;
letter-spacing:.8px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:16px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
font-size:10px;
font-weight:700;
color:var(--text-light);
margin-bottom:6px;
text-transform:uppercase;
letter-spacing:.5px;
}

.input-group input{
width:100%;
padding:12px;
border:2px solid var(--card-border);
border-radius:12px;
font-size:16px;
font-weight:600;
text-align:center;
outline:none;
transition:all .2s ease;
background:white;
}

.input-group input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(66,133,244,.1);
}

/* -------- Submit button -------- */

.submit-btn{
width:100%;
padding:16px 20px;
background:#1a1a1a;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin:10px 0 0 0;
transition:all .3s ease;
box-shadow:0 4px 6px rgba(0,0,0,.1);
letter-spacing:.5px;
}

.submit-btn:hover{
background:#000;
transform:translateY(-2px);
box-shadow:0 8px 12px rgba(0,0,0,.2);
}

.submit-btn:active{
transform:scale(.98);
box-shadow:0 2px 4px rgba(0,0,0,.1);
}

.submit-btn:disabled{
background:#666;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

/* -------- Error box -------- */

.error-box{
display:none;
color:var(--danger);
font-size:13px;
font-weight:600;
text-align:center;
margin-top:15px;
padding:12px;
background:#fff5f5;
border-radius:12px;
border:1px solid #fed7d7;
}

/* -------- Modal -------- */

.modal-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
z-index:1000;
padding:16px;
}

.modal{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:100%;
max-width:280px;
box-shadow:0 20px 25px -5px rgba(0,0,0,.1);
}

.modal h1{
color:var(--success);
margin:0;
font-size:50px;
}

.modal h3{
margin:10px 0 5px;
color:var(--text-dark);
font-size:20px;
}

.modal p{
color:var(--text-light);
font-size:14px;
margin-bottom:20px;
}

.modal-btn{
background:var(--success);
color:white;
border:none;
padding:14px;
border-radius:8px;
width:100%;
font-weight:600;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:all .2s ease;
}

.modal-btn:hover{
background:#2d9f5a;
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="container">

<div class="company-name">Swiss-Bangla Trims & Accessories</div>
<div class="weekly-title">Production Entry</div>

<div class="dashboard-link">
<a href="home.html" class="back-link">📊 Dashboard</a>
</div>

<!-- FORM (unchanged) -->

<form id="productionForm">
<!-- all your form fields remain exactly the same -->
</form>

</div>

<script>
/* YOUR ORIGINAL JS REMAINS EXACTLY THE SAME */
</script>

</body>
</html>
