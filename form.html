<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Swiss-Bangla | Entry Form</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html { -webkit-text-size-adjust: 100%; }
body { -webkit-font-smoothing: antialiased; }

:root {
  --primary:#4285f4; --success:#34a853; --danger:#ff4b2b; --oxblood:#D40101;
  --navy:#1a237e; --bg:#fdfdfd; --text-dark:#1a1f36; --text-light:#697386; --card-border:#e0e4e8; --black:#1a1a1a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{width:100%;max-width:500px;}

.company-name {
    font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: -0.3px;
    margin: 0 0 8px 0;
    line-height: 1.2;
    text-align: center;

    /* Force single line without truncation */
    white-space: nowrap;
    overflow: visible;
    text-overflow: clip;

    /* Responsive font-size so it fits in mobile screens */
    font-size: clamp(18px, 5vw, 28px);
}

.weekly-title{
font-size:15px;
color:#D40101;
font-weight:700;
letter-spacing:0.3px;
line-height:1.2;
margin:0 0 5px 0;
text-align:center;
}

.dashboard-link{ text-align:center; margin-bottom:20px; }
.back-link{
color:var(--primary);
text-decoration:none;
font-size:13px;
font-weight:600;
display:inline-block;
padding:8px 16px;
background:#f0f2f5;
border-radius:20px;
transition:all .2s ease;
border:1px solid transparent;
}
.back-link:hover{ background:#e2e6ea; transform:translateY(-1px);}
.back-link:active{ transform:scale(.95);}

/* --- Cards & Form --- */
.cards-container{ width:100%; display:grid; gap:16px; margin-bottom:20px; }
.category-card{
background:#fff; border-radius:18px; padding:22px;
box-shadow:0 10px 20px rgba(0,0,0,.02);
border:1px solid var(--card-border);
}
.card-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
.card-title{font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.8px;}
.form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:16px;}
.input-group{display:flex; flex-direction:column;}
.input-group label{font-size:10px; font-weight:700; color:var(--text-light); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;}
.input-group input{
width:100%; padding:12px; border:2px solid var(--card-border); border-radius:12px;
font-size:16px; font-weight:600; text-align:center; outline:none; transition:all .2s ease; background:white;
}
.input-group input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(66,133,244,.1); }

.submit-btn{
width:100%; padding:16px 20px; background:#1a1a1a; color:white;
border:none; border-radius:12px; font-size:16px; font-weight:600;
cursor:pointer; margin:10px 0 0 0; transition:all .3s ease; box-shadow:0 4px 6px rgba(0,0,0,.1); letter-spacing:.5px;
}
.submit-btn:hover{ background:#000; transform:translateY(-2px); box-shadow:0 8px 12px rgba(0,0,0,.2);}
.submit-btn:active{ transform:scale(.98); box-shadow:0 2px 4px rgba(0,0,0,.1);}
.submit-btn:disabled{ background:#666; cursor:not-allowed; transform:none; box-shadow:none;}

.error-box{display:none; color:var(--danger); font-size:13px; font-weight:600; text-align:center; margin-top:15px; padding:12px; background:#fff5f5; border-radius:12px; border:1px solid #fed7d7;}

@media(max-width:360px){ .company-name{ font-size:20px; } }
</style>
</head>
<body>

<div class="container">
  <div class="company-name">Swiss-Bangla Trims & Accessories</div>
  <div class="weekly-title">Add Production Entry</div>
</div>

<div class="dashboard-link">
  <a href="home.html" class="back-link">⬅ Back to Dashboard</a>
</div>

<div class="container cards-container">
  <!-- Twill Tape Card -->
  <div class="category-card">
    <div class="card-header">
      <span class="card-title">Twill Tape Items</span>
    </div>
    <div class="form-grid">
      <div class="input-group"><label>(6)-1</label><input type="number" id="t61" value="0" min="0"></div>
      <div class="input-group"><label>(6)-2</label><input type="number" id="t62" value="0" min="0"></div>
      <div class="input-group"><label>(10)-2</label><input type="number" id="t102" value="0" min="0"></div>
    </div>
  </div>

  <!-- Drawstring Card -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Drawstring Items</span></div>
    <div class="form-grid">
      <div class="input-group"><label>16H-1</label><input type="number" id="ds1" value="0" min="0"></div>
      <div class="input-group"><label>16H-2</label><input type="number" id="ds2" value="0" min="0"></div>
      <div class="input-group"><label>48H-3</label><input type="number" id="ds3" value="0" min="0"></div>
    </div>
  </div>

  <!-- Crochet Card -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Crochet Items</span></div>
    <div class="form-grid">
      <div class="input-group"><label>C-1</label><input type="number" id="c1" value="0" min="0"></div>
      <div class="input-group"><label>C-2</label><input type="number" id="c2" value="0" min="0"></div>
      <div class="input-group"><label>C-3</label><input type="number" id="c3" value="0" min="0"></div>
    </div>
  </div>

  <!-- Finishing Card (now includes F. Goods) -->
  <div class="category-card">
    <div class="card-header"><span class="card-title">Finishing & Output</span></div>
    <div class="form-grid">
      <div class="input-group"><label>Tipping</label><input type="number" id="tip" value="0" min="0"></div>
      <div class="input-group"><label>Starching</label><input type="number" id="starch" value="0" min="0"></div>
      <div class="input-group"><label>F. Goods</label><input type="number" id="fg" value="0" min="0"></div>
    </div>
  </div>
</div>

<button class="submit-btn" id="submitBtn">⚡ Final Submit</button>
<div class="error-box" id="errorBox"></div>

<script>
const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// Dhaka time helper (same as in home.html)
function getDhakaDate() {
  const now = new Date();
  return new Date(now.getTime() + (6 * 60 * 60 * 1000));
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  // Gather values
  const data = {
    entry_date: getDhakaDate().toISOString().split('T')[0],
    twill_6_1: Number(document.getElementById('t61').value) || 0,
    twill_6_2: Number(document.getElementById('t62').value) || 0,
    twill_10_2: Number(document.getElementById('t102').value) || 0,
    ds_16h_1: Number(document.getElementById('ds1').value) || 0,
    ds_16h_2: Number(document.getElementById('ds2').value) || 0,
    ds_48h_3: Number(document.getElementById('ds3').value) || 0,
    crochet_1: Number(document.getElementById('c1').value) || 0,
    crochet_2: Number(document.getElementById('c2').value) || 0,
    crochet_3: Number(document.getElementById('c3').value) || 0,
    tipping: Number(document.getElementById('tip').value) || 0,
    starching: Number(document.getElementById('starch').value) || 0,
    finished_goods: Number(document.getElementById('fg').value) || 0
  };

  // Optional: check if total > 0
  const total = Object.values(data).reduce((sum, val) => sum + (typeof val === 'number' ? val : 0), 0) - data.entry_date; // subtract entry_date string
  if (total === 0) {
    errorBox.innerText = '⚠️ Please enter at least one production value.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerText = '⏳ Syncing...';

  try {
    const { error } = await _supabase.from('production_logs').insert([data]);
    if (error) throw error;
    alert('✅ Entry added successfully!');
    // Reset all fields to 0
    ['t61','t62','t102','ds1','ds2','ds3','c1','c2','c3','tip','starch','fg'].forEach(id => {
      document.getElementById(id).value = 0;
    });
  } catch (e) {
    errorBox.innerText = e.message;
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerText = '⚡ Final Submit';
  }
});
</script>
</body>
</html>
