<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Entry Form</title>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --bg: #eef2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .form-container {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            border: 1px solid #dce1e6;
        }

        h2 {
            text-align: center;
            color: #1a1f36;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4f566b; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
            background: #fcfcfd;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover { background: #357ae8; }
        .submit-btn:disabled { background: #a5beff; cursor: not-allowed; }

        /* --- POPUP MODAL STYLES --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-icon {
            font-size: 50px;
            color: var(--success);
            margin-bottom: 15px;
        }

        .modal h3 { margin: 0 0 10px; color: #333; }
        .modal p { color: #666; margin-bottom: 25px; }

        .view-btn {
            background: var(--success);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .view-btn:hover { background: #2d9146; }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Production Entry</h2>
    <form id="productionForm" name="google-sheet">
        
        <div class="form-group">
            <label>Date (Mandatory)</label>
            <input type="date" name="Date" id="dateField" required>
        </div>

        <div class="grid">
            <div class="form-group"><label>Twill Tape (6)-1</label><input type="number" name="Twill Tape (6)-1" value="0"></div>
            <div class="form-group"><label>Twill Tape (6)-2</label><input type="number" name="Twill Tape (6)-2" value="0"></div>
            <div class="form-group"><label>Twill Tape (10)-2</label><input type="number" name="Twill Tape (10)-2" value="0"></div>
            <div class="form-group"><label>Drawstring-16H-1</label><input type="number" name="Drawstring-16H-1" value="0"></div>
            <div class="form-group"><label>Drawstring-16H-2</label><input type="number" name="Drawstring-16H-2" value="0"></div>
            <div class="form-group"><label>Drawstring-48H-3</label><input type="number" name="Drawstring-48H-3" value="0"></div>
            <div class="form-group"><label>Crochet-1</label><input type="number" name="Crochet-1" value="0"></div>
            <div class="form-group"><label>Crochet-2</label><input type="number" name="Crochet-2" value="0"></div>
            <div class="form-group"><label>Crochet-3</label><input type="number" name="Crochet-3" value="0"></div>
            <div class="form-group"><label>Tipping Machine</label><input type="number" name="Tipping Machine" value="0"></div>
            <div class="form-group"><label>Starching</label><input type="number" name="Starching" value="0"></div>
            <div class="form-group"><label>Finished Goods</label><input type="number" name="Finished Goods" value="0"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Final Submit</button>
    </form>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-icon">✅</div>
        <h3>Success!</h3>
        <p>Data has been inserted successfully.</p>
        <a href="view-data.html" class="view-btn">View Data</a>
    </div>
</div>

<script>
    // 1. Set default date to today
    const dateInput = document.getElementById('dateField');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    // 2. Form Logic
    const scriptURL = 'REPLACE_WITH_YOUR_APPS_SCRIPT_URL'; 
    const form = document.forms['google-sheet'];
    const btn = document.getElementById('submitBtn');
    const modal = document.getElementById('modalOverlay');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Inserting...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                // Show Popup
                modal.style.display = 'flex';
                
                // Reset Form
                btn.disabled = false;
                btn.innerText = 'Final Submit';
                form.reset();
                dateInput.value = today;
            })
            .catch(error => {
                alert('Error! Please check your connection.');
                btn.disabled = false;
                btn.innerText = 'Final Submit';
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
