<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Entry Form</title>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --bg: #eef2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }

        h2 { text-align: center; color: #333; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #357ae8; }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 350px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .view-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Production Entry</h2>
    <form id="productionForm">
        <div class="form-group">
            <label>Date (Mandatory)</label>
            <input type="date" name="Date" id="dateField" required>
        </div>

        <div class="grid">
            <div class="form-group"><label>Twill Tape (6)-1</label><input type="number" name="Twill Tape (6)-1" value="0"></div>
            <div class="form-group"><label>Twill Tape (6)-2</label><input type="number" name="Twill Tape (6)-2" value="0"></div>
            <div class="form-group"><label>Twill Tape (10)-2</label><input type="number" name="Twill Tape (10)-2" value="0"></div>
            <div class="form-group"><label>Drawstring-16H-1</label><input type="number" name="Drawstring-16H-1" value="0"></div>
            <div class="form-group"><label>Drawstring-16H-2</label><input type="number" name="Drawstring-16H-2" value="0"></div>
            <div class="form-group"><label>Drawstring-48H-3</label><input type="number" name="Drawstring-48H-3" value="0"></div>
            <div class="form-group"><label>Crochet-1</label><input type="number" name="Crochet-1" value="0"></div>
            <div class="form-group"><label>Crochet-2</label><input type="number" name="Crochet-2" value="0"></div>
            <div class="form-group"><label>Crochet-3</label><input type="number" name="Crochet-3" value="0"></div>
            <div class="form-group"><label>Tipping Machine</label><input type="number" name="Tipping Machine" value="0"></div>
            <div class="form-group"><label>Starching</label><input type="number" name="Starching" value="0"></div>
            <div class="form-group"><label>Finished Goods</label><input type="number" name="Finished Goods" value="0"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Final Submit</button>
    </form>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h1 style="color:var(--success)">✅</h1>
        <h3>Success!</h3>
        <p>Data has been inserted successfully.</p>
        <a href="view-data.html" class="view-btn">View Data</a>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxPPSb-IFARQ_OysFY3JjYDR2mkcuSJMB59RHa5XxMHoiPYZF2B1XoNrflRapE14Ncf/exec';
    const form = document.getElementById('productionForm');
    const dateInput = document.getElementById('dateField');
    
    // Set today's date
    dateInput.value = new Date().toISOString().split('T')[0];

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Submitting...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                document.getElementById('modalOverlay').style.display = 'flex';
                form.reset();
                dateInput.value = new Date().toISOString().split('T')[0];
                btn.disabled = false;
                btn.innerText = 'Final Submit';
            })
            .catch(error => alert('Error submitting data!'));
    });
</script>
</body>
</html>
