<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Entry Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --danger: #ff4b2b;
            --navy: #1a237e;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #e0e4e8;
        }

        /* Matches home.html exactly to prevent layout shift */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Matches home.html exactly */
        .header {
            width: 100%; max-width: 500px;
            margin-bottom: 15px;
            text-align: center;
        }

        .company-name {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 600;
            color: var(--navy);
            white-space: nowrap;
            letter-spacing: -0.3px;
            margin: 0 0 8px 0;
            line-height: 1.2;
        }

        .page-title {
            font-size: 15px;
            color: #D40101;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin: 0 0 5px 0;
        }

        /* Navigation & Content Containers */
        .nav-section, .cards-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .nav-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: #475569;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--card-border);
            margin-top: 10px;
        }

        /* Category Cards - matching metric-card style */
        .category-card {
            background: #fff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--card-border);
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: block;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
        }

        .input-group { display: flex; flex-direction: column; }

        .input-group label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        .input-group input:focus { border-color: var(--primary); }

        .submit-btn {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-sizing: border-box;
        }

        .submit-btn:disabled { background: #666; }

        /* Modal styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 80%; max-width: 280px;
        }

        .modal-btn {
            background: var(--success); color: white;
            padding: 12px; border-radius: 8px; display: block;
            text-decoration: none; margin-top: 20px; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="company-name">Swiss-Bangla Trims & Accessories</div>
        <div class="page-title">Production Entry</div>
        <a href="home.html" class="nav-link-btn">
            <span id="dateText">Back to Dashboard</span>
        </a>
    </div>

    <form id="productionForm" style="width: 100%; max-width: 500px;">
        <div class="cards-container">
            <div class="category-card">
                <span class="card-title">Twill Tape Items</span>
                <div class="form-grid">
                    <div class="input-group"><label>(6)-1</label><input type="number" name="twill_6_1" value="0"></div>
                    <div class="input-group"><label>(6)-2</label><input type="number" name="twill_6_2" value="0"></div>
                    <div class="input-group"><label>(10)-2</label><input type="number" name="twill_10_2" value="0"></div>
                </div>
            </div>

            <div class="category-card">
                <span class="card-title">Drawstring Items</span>
                <div class="form-grid">
                    <div class="input-group"><label>16H-1</label><input type="number" name="ds_16h_1" value="0"></div>
                    <div class="input-group"><label>16H-2</label><input type="number" name="ds_16h_2" value="0"></div>
                    <div class="input-group"><label>48H-3</label><input type="number" name="ds_48h_3" value="0"></div>
                </div>
            </div>

            <div class="category-card">
                <span class="card-title">Finishing & Output</span>
                <div class="form-grid">
                    <div class="input-group"><label>Tipping</label><input type="number" name="tipping" value="0"></div>
                    <div class="input-group"><label>Starching</label><input type="number" name="starching" value="0"></div>
                    <div class="input-group"><label>F. Goods</label><input type="number" name="finished_goods" value="0"></div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">⚡ Final Submit</button>
    </form>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h1>✅</h1>
            <h3>Data Saved!</h3>
            <p>Production logged successfully.</p>
            <a href="home.html" class="modal-btn">Go to Dashboard</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('productionForm');
        
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Saving...";

            const formData = new FormData(form);
            const entry = Object.fromEntries(formData.entries());
            
            // Convert strings to numbers
            for (let key in entry) entry[key] = parseInt(entry[key]) || 0;

            // Set current Dhaka Date
            const now = new Date();
            const dhakaDate = new Date(now.getTime() + (6 * 60 * 60 * 1000));
            entry.entry_date = dhakaDate.toISOString().split('T')[0];

            const { error } = await _supabase.from('production_logs').insert([entry]);

            if (error) {
                alert("Error saving: " + error.message);
                btn.disabled = false;
                btn.innerText = "⚡ Final Submit";
            } else {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
