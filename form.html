<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Entry Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --danger: #ff4b2b;
            --bg: #eef2f5;
            --brand-dark: #1a1f36;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; margin: 0;
        }

        .form-container {
            position: relative;
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 500px;
        }

        /* Branding Header */
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header h1 { font-size: 14px; color: var(--brand-dark); margin: 0; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; }
        .brand-header h2 { font-size: 24px; color: #333; margin: 5px 0 0 0; }

        /* Dynamic Navigation Button (Option 2 - Clipboard) */
        .nav-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: #475569;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            margin: 12px auto 20px auto;
            transition: all 0.2s ease;
        }
        .nav-link-btn:hover { 
            background: #e2e8f0; 
            color: var(--brand-dark);
            transform: translateY(-1px);
        }
        .nav-link-btn svg { margin-right: 8px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #64748b; font-size: 12px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); background: #fcfdfe; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .submit-btn {
            width: 100%; padding: 16px; background: var(--brand-dark);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }
        .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .error-box {
            display: none; color: var(--danger); font-size: 13px;
            font-weight: 600; text-align: center; margin-top: 15px;
            padding: 10px; background: #fff5f5; border-radius: 8px;
            border: 1px solid #fed7d7;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.3); width: 80%; max-width: 320px; }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="brand-header">
        <h1>Swiss-Bangla Trims & Accessories</h1>
        <h2>Production Entry</h2>
        
        <a href="daily_edit.html" class="nav-link-btn" id="dynamicDateBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
            <span id="dateText">Loading...</span>
        </a>
    </div>

    <form id="productionForm">
        <div class="form-group">
            <label>Date (Mandatory)</label>
            <input type="date" name="Date" id="dateField" required>
        </div>

        <div class="grid">
            <div class="form-group"><label>Twill Tape (6)-1</label><input type="number" name="t61" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Twill Tape (6)-2</label><input type="number" name="t62" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Twill Tape (10)-2</label><input type="number" name="t102" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Drawstring-16H-1</label><input type="number" name="d16h1" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Drawstring-16H-2</label><input type="number" name="d16h2" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Drawstring-48H-3</label><input type="number" name="d48h3" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Crochet-1</label><input type="number" name="c1" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Crochet-2</label><input type="number" name="c2" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Crochet-3</label><input type="number" name="c3" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Tipping Machine</label><input type="number" name="tipping" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Starching</label><input type="number" name="starching" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
            <div class="form-group"><label>Finished Goods</label><input type="number" name="fg" value="0" onfocus="hFocus(this)" onblur="hBlur(this)"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Final Submit</button>
        <div id="errorDisplay" class="error-box">⚠️ Please enter at least one production value.</div>
    </form>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h1 style="color:var(--success); margin:0; font-size: 50px;">✅</h1>
        <h3 style="margin-top: 10px;">Data Saved!</h3>
        <p style="color: #64748b; font-size: 14px;">Production logged successfully.</p>
        <a href="home.html" style="background:var(--success); color:white; padding:12px 25px; text-decoration:none; border-radius:8px; display:inline-block; margin-top:15px; font-weight:bold; width: 100%; box-sizing: border-box;">Go to Dashboard</a>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('productionForm');
    const errBox = document.getElementById('errorDisplay');
    const dateInput = document.getElementById('dateField');
    const dateText = document.getElementById('dateText');
    
    dateInput.value = new Date().toISOString().split('T')[0];

    function setDynamicLabel() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = now.toLocaleString('en-GB', { month: 'short' });
        const year = String(now.getFullYear()).slice(-2);
        dateText.innerText = `${day} ${month} ${year}`;
    }

    function hFocus(i) { if(i.value === "0") i.value = ""; errBox.style.display = "none"; }
    function hBlur(i) { if(i.value === "") i.value = "0"; }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const formData = new FormData(form);
        
        let total = 0;
        ['t61','t62','t102','d16h1','d16h2','d48h3','c1','c2','c3','tipping','starching','fg'].forEach(f => {
            total += parseInt(formData.get(f)) || 0;
        });

        if (total === 0) {
            errBox.style.display = "block";
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const { error } = await _supabase.from('production_logs').insert([{ 
            entry_date: formData.get('Date'),
            twill_6_1: parseInt(formData.get('t61')) || 0,
            twill_6_2: parseInt(formData.get('t62')) || 0,
            twill_10_2: parseInt(formData.get('t102')) || 0,
            ds_16h_1: parseInt(formData.get('d16h1')) || 0,
            ds_16h_2: parseInt(formData.get('d16h2')) || 0,
            ds_48h_3: parseInt(formData.get('d48h3')) || 0,
            crochet_1: parseInt(formData.get('c1')) || 0,
            crochet_2: parseInt(formData.get('c2')) || 0,
            crochet_3: parseInt(formData.get('c3')) || 0,
            tipping: parseInt(formData.get('tipping')) || 0,
            starching: parseInt(formData.get('starching')) || 0,
            finished_goods: parseInt(formData.get('fg')) || 0
        }]);

        if (error) {
            errBox.innerText = "❌ Sync Failed: " + error.message;
            errBox.style.display = "block";
            btn.disabled = false;
            btn.innerText = 'Final Submit';
        } else {
            document.getElementById('modalOverlay').style.display = 'flex';
            form.reset();
            dateInput.value = new Date().toISOString().split('T')[0];
            btn.disabled = false;
            btn.innerText = 'Final Submit';
        }
    });

    window.onload = setDynamicLabel;
</script>
</body>
</html>
