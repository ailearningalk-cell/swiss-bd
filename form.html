<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Swiss-Bangla | Production Entry</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== PERMANENT WEBVIEW FIX ===== */

html{
-webkit-text-size-adjust:100%;
text-size-adjust:100%;
}

/* ===== ROOT COLORS ===== */

:root{
--primary:#4285f4;
--success:#34a853;
--danger:#ff4b2b;
--navy:#1a237e;
--bg:#fdfdfd;
--text-dark:#1a1f36;
--text-light:#697386;
--card-border:#e0e4e8;
}

/* ===== BASE ===== */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Roboto,
Arial,
sans-serif;

background:var(--bg);

padding:20px;

display:flex;
flex-direction:column;
align-items:center;

min-height:100vh;

}

/* ===== CONTAINER ===== */

.container{
width:100%;
max-width:520px;
}

/* ===== HEADER ===== */

.company-name{

font-size:clamp(20px,5vw,28px);
font-weight:600;

color:var(--navy);

text-align:center;

margin-bottom:6px;

line-height:1.2;
min-height:1.2em;

}

.weekly-title{

font-size:15px;
font-weight:700;

color:#D40101;

text-align:center;

margin-bottom:15px;

line-height:1.2;
min-height:1.2em;

}

/* ===== DASHBOARD LINK ===== */

.dashboard-link{

text-align:center;

margin-bottom:18px;

}

.back-link{

color:var(--primary);

text-decoration:none;

font-size:13px;

font-weight:600;

background:#f0f2f5;

padding:7px 16px;

border-radius:20px;

}

/* ===== CARDS ===== */

.cards-container{

display:grid;

gap:16px;

margin-bottom:16px;

}

.category-card{

background:white;

border-radius:16px;

padding:20px;

border:1px solid var(--card-border);

box-shadow:0 6px 14px rgba(0,0,0,.03);

}

.card-title{

font-size:11px;

font-weight:700;

color:var(--text-light);

margin-bottom:14px;

letter-spacing:.8px;

text-transform:uppercase;

}

.form-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(130px,1fr));

gap:14px;

}

.input-group{

display:flex;

flex-direction:column;

}

.input-group label{

font-size:10px;

font-weight:700;

color:var(--text-light);

margin-bottom:5px;

letter-spacing:.5px;

}

.input-group input{

padding:11px;

border:2px solid var(--card-border);

border-radius:10px;

text-align:center;

font-size:16px;

font-weight:600;

outline:none;

}

.input-group input:focus{

border-color:var(--primary);

box-shadow:0 0 0 3px rgba(66,133,244,.1);

}

/* ===== SUBMIT BUTTON ===== */

.submit-btn{

width:100%;

margin-top:10px;

padding:15px;

background:#1a1a1a;

color:white;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

/* ===== ERROR ===== */

.error-box{

display:none;

margin-top:12px;

padding:10px;

background:#fff5f5;

border:1px solid #fed7d7;

border-radius:10px;

color:var(--danger);

font-size:13px;

text-align:center;

}

/* ===== SUCCESS MODAL ===== */

.modal-overlay{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.6);

justify-content:center;
align-items:center;

}

.modal{

background:white;

padding:30px;

border-radius:18px;

text-align:center;

width:260px;

}

.modal h1{

font-size:50px;

color:var(--success);

margin-bottom:6px;

}

.modal h3{

margin-bottom:6px;

}

.modal-btn{

background:var(--success);

color:white;

border:none;

padding:12px;

border-radius:8px;

width:100%;

font-weight:600;

text-decoration:none;

display:inline-block;

}

</style>

</head>

<body>

<div class="container">

<div class="company-name">
Swiss-Bangla Trims & Accessories
</div>

<div class="weekly-title">
Production Entry
</div>

<div class="dashboard-link">
<a href="home.html" class="back-link">📊 Dashboard</a>
</div>

<form id="productionForm">

<div class="cards-container">

<!-- Twill Tape -->

<div class="category-card">

<div class="card-title">Twill Tape</div>

<div class="form-grid">

<div class="input-group">
<label>(6)-1</label>
<input type="number" name="t61" value="0">
</div>

<div class="input-group">
<label>(6)-2</label>
<input type="number" name="t62" value="0">
</div>

<div class="input-group">
<label>(10)-2</label>
<input type="number" name="t102" value="0">
</div>

</div>
</div>

<!-- Drawstring -->

<div class="category-card">

<div class="card-title">Drawstring</div>

<div class="form-grid">

<div class="input-group">
<label>16H-1</label>
<input type="number" name="d16h1" value="0">
</div>

<div class="input-group">
<label>16H-2</label>
<input type="number" name="d16h2" value="0">
</div>

<div class="input-group">
<label>48H-3</label>
<input type="number" name="d48h3" value="0">
</div>

</div>
</div>

<!-- Crochet -->

<div class="category-card">

<div class="card-title">Crochet</div>

<div class="form-grid">

<div class="input-group">
<label>C-1</label>
<input type="number" name="c1" value="0">
</div>

<div class="input-group">
<label>C-2</label>
<input type="number" name="c2" value="0">
</div>

<div class="input-group">
<label>C-3</label>
<input type="number" name="c3" value="0">
</div>

</div>
</div>

<!-- Finishing -->

<div class="category-card">

<div class="card-title">Finishing</div>

<div class="form-grid">

<div class="input-group">
<label>Tipping</label>
<input type="number" name="tipping" value="0">
</div>

<div class="input-group">
<label>Starching</label>
<input type="number" name="starching" value="0">
</div>

<div class="input-group">
<label>F. Goods</label>
<input type="number" name="fg" value="0">
</div>

</div>
</div>

</div>

<button type="submit" class="submit-btn">
⚡ Final Submit
</button>

<div id="errorDisplay" class="error-box">
⚠️ Please enter at least one production value
</div>

</form>

</div>

<!-- SUCCESS MODAL -->

<div class="modal-overlay" id="modalOverlay">

<div class="modal">

<h1>✅</h1>

<h3>Saved</h3>

<p>Production data submitted</p>

<a href="home.html" class="modal-btn">
Dashboard
</a>

</div>

</div>

<script>

const form=document.getElementById("productionForm");
const errorBox=document.getElementById("errorDisplay");

form.addEventListener("submit",function(e){

e.preventDefault();

let total=0;

form.querySelectorAll("input").forEach(i=>{
total+=parseInt(i.value)||0;
});

if(total===0){

errorBox.style.display="block";

return;

}

document.getElementById("modalOverlay").style.display="flex";

});

</script>

</body>
</html>
