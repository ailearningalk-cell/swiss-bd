<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Entry (Fast-Sync)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --bg: #eef2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }

        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 350px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .view-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Production Entry</h2>
    <form id="productionForm">
        <div class="form-group">
            <label>Date (Mandatory)</label>
            <input type="date" name="Date" id="dateField" required>
        </div>

        <div class="grid">
            <div class="form-group"><label>Twill Tape (6)-1</label><input type="number" name="t61" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Twill Tape (6)-2</label><input type="number" name="t62" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Twill Tape (10)-2</label><input type="number" name="t102" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Drawstring-16H-1</label><input type="number" name="d16h1" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Drawstring-16H-2</label><input type="number" name="d16h2" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Drawstring-48H-3</label><input type="number" name="d48h3" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Crochet-1</label><input type="number" name="c1" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Crochet-2</label><input type="number" name="c2" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Crochet-3</label><input type="number" name="c3" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Tipping Machine</label><input type="number" name="tipping" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Starching</label><input type="number" name="starching" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
            <div class="form-group"><label>Finished Goods</label><input type="number" name="fg" value="0" onfocus="handleFocus(this)" onblur="handleBlur(this)"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Final Submit</button>
    </form>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h1 style="color:var(--success)">✅</h1>
        <h3>Success!</h3>
        <p>Data synced to Supabase instantly.</p>
        <a href="home.html" class="view-btn">View Dashboard</a>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('productionForm');
    const dateInput = document.getElementById('dateField');
    
    // Default today's date
    dateInput.value = new Date().toISOString().split('T')[0];

    // UX: Omit 0 when clicking
    function handleFocus(input) {
        if (input.value === "0") {
            input.value = "";
        }
    }

    // UX: Restore 0 if left empty
    function handleBlur(input) {
        if (input.value === "") {
            input.value = "0";
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const formData = new FormData(form);

        // Validation: All can't be 0
        let totalItems = 0;
        const itemFields = ['t61', 't62', 't102', 'd16h1', 'd16h2', 'd48h3', 'c1', 'c2', 'c3', 'tipping', 'starching', 'fg'];
        
        itemFields.forEach(field => {
            totalItems += parseInt(formData.get(field)) || 0;
        });

        if (totalItems === 0) {
            alert('Error: You cannot submit a form where all item values are 0.');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const { error } = await _supabase
            .from('production_logs')
            .insert([{ 
                entry_date: formData.get('Date'),
                twill_6_1: parseInt(formData.get('t61')) || 0,
                twill_6_2: parseInt(formData.get('t62')) || 0,
                twill_10_2: parseInt(formData.get('t102')) || 0,
                ds_16h_1: parseInt(formData.get('d16h1')) || 0,
                ds_16h_2: parseInt(formData.get('d16h2')) || 0,
                ds_48h_3: parseInt(formData.get('d48h3')) || 0,
                crochet_1: parseInt(formData.get('c1')) || 0,
                crochet_2: parseInt(formData.get('c2')) || 0,
                crochet_3: parseInt(formData.get('c3')) || 0,
                tipping: parseInt(formData.get('tipping')) || 0,
                starching: parseInt(formData.get('starching')) || 0,
                finished_goods: parseInt(formData.get('fg')) || 0
            }]);

        if (error) {
            console.error(error);
            alert('Error syncing to Supabase: ' + error.message);
            btn.disabled = false;
            btn.innerText = 'Final Submit';
        } else {
            document.getElementById('modalOverlay').style.display = 'flex';
            form.reset();
            dateInput.value = new Date().toISOString().split('T')[0];
            btn.disabled = false;
            btn.innerText = 'Final Submit';
        }
    });
</script>
</body>
</html>
