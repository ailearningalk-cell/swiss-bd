<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Weekly Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --brand: #1a1f36;
            --primary: #4285f4;
            --success: #34a853;
            --oxblood: #D40101;
            --navy: #1a237e;
            --danger: #ff4b2b;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #e0e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* Company name */
        .company-name {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 600;
            color: var(--navy);
            white-space: nowrap;
            letter-spacing: -0.3px;
            margin: 0 0 8px 0;
            line-height: 1.2;
            text-align: center;
        }

        /* Weekly Data title - universal styling */
        .weekly-title {
            font-size: 15px;
            color: #D40101;
            font-weight: 700;
            letter-spacing: 0.3px;
            line-height: 1.2;
            margin: 0 0 5px 0;
            text-align: center;
        }

        /* Dashboard link */
        .dashboard-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            display: inline-block;
            padding: 5px 12px;
            background: #f0f2f5;
            border-radius: 20px;
        }

        /* Week Selector Card */
        .selector-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            padding: 20px;
        }

        .selector-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .week-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .week-nav-btn {
            background: #f0f2f5;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 600;
            color: var(--brand);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .week-nav-btn:active {
            background: var(--brand);
            color: white;
            transform: scale(0.95);
        }

        .week-range {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand);
            text-align: center;
        }

        .week-range span {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
            margin: 0 5px;
        }

        /* Calendar Strip */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            text-align: center;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--card-border);
        }
        
        .day-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 8px 0;
            background: #f8f9fc;
            border-radius: 12px;
        }
        
        .day-name { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-light); 
            margin-bottom: 4px;
        }
        
        .day-num { 
            font-size: 16px; 
            font-weight: 800; 
            color: var(--text-dark); 
        }

        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }
        .bg-today { background: rgba(52, 168, 83, 0.1); }

        /* Stats Row */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 18px; border-radius: 18px; border: 1px solid var(--card-border); }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 800; margin-top: 5px; color: var(--brand); }

        /* Main Data Table */
        .table-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { 
            background: #fcfdfe; padding: 12px; text-align: left; 
            font-size: 10px; font-weight: 700; color: var(--text-light);
            border-bottom: 1px solid var(--card-border); text-transform: uppercase;
        }
        td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid #f8f9fb; color: var(--text-dark); }
        .row-total { font-weight: 800; color: var(--primary); text-align: right; }

        .loading { padding: 40px; text-align: center; color: var(--text-light); font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="company-name">Swiss-Bangla Trims & Accessories</div>
        <div class="weekly-title">Weekly Data</div>
        
        <div class="dashboard-link">
            <a href="home.html" class="back-link">📊 Dashboard</a>
        </div>

        <div class="selector-card">
            <span class="selector-label">Viewing Report For</span>
            
            <div class="week-selector">
                <button class="week-nav-btn" onclick="changeWeek(-1)">←</button>
                <div class="week-range" id="weekRangeDisplay"></div>
                <button class="week-nav-btn" onclick="changeWeek(1)">→</button>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Total Output</span>
                <div id="week_total" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Avg</span>
                <div id="avg_total" class="stat-val" style="color: var(--success)">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Twill</th>
                            <th>Draw 16H-1</th>
                            <th>Draw 32H-2</th>
                            <th>Draw 32H-3</th>
                            <th>Draw 48H-3</th>
                            <th>Croc</th>
                            <th>Tip</th>
                            <th>Starch</th>
                            <th style="text-align: right;">Total FG</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader" class="loading">Loading records...</div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let weekOffset = 0;
        let columnTotals = {
            twill: 0,
            draw16h1: 0,
            draw32h2: 0,
            draw32h3: 0,
            draw48h3: 0,
            crochet: 0,
            tip: 0,
            starch: 0,
            fg: 0
        };

        function formatDate(date) {
            const day = date.getDate();
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[date.getMonth()];
            return `${day} ${month}`;
        }

        function getWeekRange(offset) {
            const now = new Date();
            now.setDate(now.getDate() + (offset * 7));
            
            const dayOfWeek = now.getDay();
            
            const sundayDate = new Date(now);
            sundayDate.setDate(now.getDate() - dayOfWeek);
            
            const weekStart = new Date(sundayDate);
            const weekEnd = new Date(sundayDate);
            weekEnd.setDate(sundayDate.getDate() + 6);

            return { 
                weekStart, 
                weekEnd,
                start: weekStart.toISOString().split('T')[0], 
                end: weekEnd.toISOString().split('T')[0] 
            };
        }

        function updateCalendarAndFetch() {
            const range = getWeekRange(weekOffset);
            const { weekStart, weekEnd } = range;

            document.getElementById('weekRangeDisplay').innerHTML = 
                `${formatDate(weekStart)} <span>—</span> ${formatDate(weekEnd)} ${weekEnd.getFullYear()}`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            const dayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
            
            const now = new Date();
            
            for (let i = 0; i < 7; i++) {
                const current = new Date(weekStart);
                current.setDate(weekStart.getDate() + i);
                
                const isToday = (weekOffset === 0) && (current.toDateString() === now.toDateString());
                const isFriday = current.getDay() === 5;
                
                let colorClass = "";
                let bgClass = "";
                if (isToday) {
                    colorClass = "text-green";
                    bgClass = "bg-today";
                }
                else if (isFriday) colorClass = "text-red";

                grid.innerHTML += `
                    <div class="day-box ${bgClass}">
                        <span class="day-name ${colorClass}">${dayNames[i]}</span>
                        <span class="day-num ${colorClass}">${current.getDate()}</span>
                    </div>
                `;
            }
            
            fetchWeeklyData(range.start, range.end);
        }

        function changeWeek(direction) {
            weekOffset += direction;
            updateCalendarAndFetch();
        }

        async function fetchWeeklyData(startDate, endDate) {
            document.getElementById('loader').style.display = "block";
            document.getElementById('tableBody').innerHTML = "";
            
            // Reset column totals
            columnTotals = {
                twill: 0,
                draw16h1: 0,
                draw32h2: 0,
                draw32h3: 0,
                draw48h3: 0,
                crochet: 0,
                tip: 0,
                starch: 0,
                fg: 0
            };
            
            try {
                const { data, error } = await _supabase.from('production_logs').select('*')
                    .gte('entry_date', startDate).lte('entry_date', endDate)
                    .order('entry_date', { ascending: false });
                    
                if (!error) processData(data);
            } catch (err) { console.error(err); }
        }

        function processData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loader').style.display = "none";
            tableBody.innerHTML = "";
            let grandTotal = 0;
            const grouped = {};

            data.forEach(row => {
                const d = row.entry_date;
                if (!grouped[d]) grouped[d] = { 
                    twill:0, 
                    draw16h1:0, 
                    draw32h2:0, 
                    draw32h3:0, 
                    draw48h3:0, 
                    crochet:0, 
                    tip:0, 
                    starch:0, 
                    fg:0 
                };
                
                const twill = (Number(row.twill_6_1) || 0) + (Number(row.twill_6_2) || 0) + (Number(row.twill_10_2) || 0);
                
                // Individual drawstring columns
                const draw16h1 = Number(row.ds_16h_1) || 0;
                const draw32h2 = Number(row.ds_32h_2) || 0;
                const draw32h3 = Number(row.ds_32h_3) || 0;
                const draw48h3 = Number(row.ds_48h_3) || 0;
                
                const crochet = (Number(row.crochet_1) || 0) + (Number(row.crochet_2) || 0) + (Number(row.crochet_3) || 0);
                const tip = Number(row.tipping) || 0;
                const starch = Number(row.starching) || 0;
                const fg = Number(row.finished_goods) || 0;
                
                grouped[d].twill += twill;
                grouped[d].draw16h1 += draw16h1;
                grouped[d].draw32h2 += draw32h2;
                grouped[d].draw32h3 += draw32h3;
                grouped[d].draw48h3 += draw48h3;
                grouped[d].crochet += crochet;
                grouped[d].tip += tip;
                grouped[d].starch += starch;
                grouped[d].fg += fg;
                
                // Add to column totals
                columnTotals.twill += twill;
                columnTotals.draw16h1 += draw16h1;
                columnTotals.draw32h2 += draw32h2;
                columnTotals.draw32h3 += draw32h3;
                columnTotals.draw48h3 += draw48h3;
                columnTotals.crochet += crochet;
                columnTotals.tip += tip;
                columnTotals.starch += starch;
                columnTotals.fg += fg;
                
                grandTotal += fg;
            });

            Object.keys(grouped).sort().reverse().forEach(date => {
                const day = grouped[date];
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${new Date(date).getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date(date).getMonth()]}</b></td>
                        <td>${day.twill.toLocaleString()}</td>
                        <td>${day.draw16h1.toLocaleString()}</td>
                        <td>${day.draw32h2.toLocaleString()}</td>
                        <td>${day.draw32h3.toLocaleString()}</td>
                        <td>${day.draw48h3.toLocaleString()}</td>
                        <td>${day.crochet.toLocaleString()}</td>
                        <td>${day.tip.toLocaleString()}</td>
                        <td>${day.starch.toLocaleString()}</td>
                        <td class="row-total">${day.fg.toLocaleString()}</td>
                    </tr>
                `;
            });
            
            // Add summation row at the bottom with all columns
            tableBody.innerHTML += `
                <tr style="background-color: #f0f2f5; font-weight: 800; border-top: 2px solid #1a1f36;">
                    <td><b>TOTAL</b></td>
                    <td><b>${columnTotals.twill.toLocaleString()}</b></td>
                    <td><b>${columnTotals.draw16h1.toLocaleString()}</b></td>
                    <td><b>${columnTotals.draw32h2.toLocaleString()}</b></td>
                    <td><b>${columnTotals.draw32h3.toLocaleString()}</b></td>
                    <td><b>${columnTotals.draw48h3.toLocaleString()}</b></td>
                    <td><b>${columnTotals.crochet.toLocaleString()}</b></td>
                    <td><b>${columnTotals.tip.toLocaleString()}</b></td>
                    <td><b>${columnTotals.starch.toLocaleString()}</b></td>
                    <td class="row-total" style="color: var(--primary);"><b>${columnTotals.fg.toLocaleString()}</b></td>
                </tr>
            `;
            
            document.getElementById('week_total').innerText = grandTotal.toLocaleString();
            document.getElementById('avg_total').innerText = Math.round(grandTotal / (Object.keys(grouped).length || 1)).toLocaleString();
        }

        window.onload = () => {
            weekOffset = 0;
            updateCalendarAndFetch();
        };
    </script>
</body>
</html>
