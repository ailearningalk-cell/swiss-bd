<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Weekly Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --brand: #1a1f36;
            --primary: #4285f4;
            --success: #34a853;
            --oxblood: #D40101;
            --navy: #1a237e;
            --danger: #ff4b2b;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #e0e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* Company name - same as home/monthly pages */
        .company-name {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 600;
            color: var(--navy);
            white-space: nowrap;
            letter-spacing: -0.3px;
            margin: 0 0 8px 0;
            line-height: 1.2;
            text-align: center;
        }

        /* Weekly Data title - same color as Live Production */
        .weekly-title {
            font-size: 15px;
            color: #D40101;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Dashboard link below the title */
        .dashboard-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            display: inline-block;
            padding: 5px 12px;
            background: #f0f2f5;
            border-radius: 20px;
        }

        /* --- Week Selector Card --- */
        .selector-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            padding: 20px;
        }

        .selector-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .week-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .week-nav-btn {
            background: #f0f2f5;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 600;
            color: var(--brand);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .week-nav-btn:active {
            background: var(--brand);
            color: white;
            transform: scale(0.95);
        }

        .week-range {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand);
            text-align: center;
        }

        .week-range span {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
            margin: 0 5px;
        }

        /* --- Calendar Strip --- */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            text-align: center;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--card-border);
        }
        
        .day-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 8px 0;
            background: #f8f9fc;
            border-radius: 12px;
        }
        
        .day-name { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-light); 
            margin-bottom: 4px;
        }
        
        .day-num { 
            font-size: 16px; 
            font-weight: 800; 
            color: var(--text-dark); 
        }

        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }
        .bg-today { background: rgba(52, 168, 83, 0.1); }

        /* --- Stats Row --- */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 18px; border-radius: 18px; border: 1px solid var(--card-border); }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 800; margin-top: 5px; color: var(--brand); }

        /* --- Main Data Table (Scrollable) --- */
        .table-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { 
            background: #fcfdfe; padding: 12px; text-align: left; 
            font-size: 10px; font-weight: 700; color: var(--text-light);
            border-bottom: 1px solid var(--card-border); text-transform: uppercase;
        }
        td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid #f8f9fb; color: var(--text-dark); }
        .row-total { font-weight: 800; color: var(--primary); text-align: right; }

        /* --- Footer Button --- */
        .footer-actions { 
            width: 100%; 
            display: flex; 
            justify-content: flex-start;
            padding-bottom: 40px; 
        }
        .btn-pdf {
            background: var(--brand); 
            color: white; 
            border: none;
            padding: 14px 28px; 
            border-radius: 30px; 
            font-weight: 600;
            cursor: pointer; 
            font-size: 16px; 
            width: auto;
            min-width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn-pdf:active { transform: scale(0.98); background: #2a2f46; }

        .loading { padding: 40px; text-align: center; color: var(--text-light); font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Swiss-Bangla Title -->
        <div class="company-name">Swiss-Bangla Trims & Accessories</div>
        
        <!-- Weekly Data title -->
        <div class="weekly-title">Weekly Data</div>
        
        <!-- Dashboard link -->
        <div class="dashboard-link">
            <a href="home.html" class="back-link">📊 Dashboard</a>
        </div>

        <!-- Week Selector Card -->
        <div class="selector-card">
            <span class="selector-label">Viewing Report For</span>
            
            <div class="week-selector">
                <button class="week-nav-btn" onclick="changeWeek(-1)">←</button>
                <div class="week-range" id="weekRangeDisplay"></div>
                <button class="week-nav-btn" onclick="changeWeek(1)">→</button>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Total Output</span>
                <div id="week_total" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Avg</span>
                <div id="avg_total" class="stat-val" style="color: var(--success)">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Twill</th>
                            <th>Draw</th>
                            <th>Croc</th>
                            <th>Tip</th>
                            <th>Starch</th>
                            <th style="text-align: right;">Total FG</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader" class="loading">Loading records...</div>
        </div>

        <div class="footer-actions">
            <button class="btn-pdf" onclick="generatePDF()">📄 Download PDF</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Store current week offset (0 = current week, -1 = previous week, 1 = next week)
        let weekOffset = 0;

        function formatDate(date) {
            const day = date.getDate();
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[date.getMonth()];
            return `${day} ${month}`;
        }

        function getWeekRange(offset) {
            const now = new Date();
            
            // Adjust for offset (weeks)
            now.setDate(now.getDate() + (offset * 7));
            
            const dayOfWeek = now.getDay();
            
            // Get Sunday of the current week view
            const sundayDate = new Date(now);
            sundayDate.setDate(now.getDate() - dayOfWeek);
            
            // Week starts on Sunday and ends on Saturday
            const weekStart = new Date(sundayDate);
            const weekEnd = new Date(sundayDate);
            weekEnd.setDate(sundayDate.getDate() + 6);

            return { 
                weekStart, 
                weekEnd,
                start: weekStart.toISOString().split('T')[0], 
                end: weekEnd.toISOString().split('T')[0] 
            };
        }

        function updateCalendarAndFetch() {
            const range = getWeekRange(weekOffset);
            const { weekStart, weekEnd } = range;

            // Display week range (Sunday to Saturday)
            const weekRangeDisplay = document.getElementById('weekRangeDisplay');
            weekRangeDisplay.innerHTML = `${formatDate(weekStart)} <span>—</span> ${formatDate(weekEnd)} ${weekEnd.getFullYear()}`;

            // Generate calendar grid
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            const dayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
            
            const now = new Date();
            
            for (let i = 0; i < 7; i++) {
                const current = new Date(weekStart);
                current.setDate(weekStart.getDate() + i);
                
                // Check if this is today (only for current week)
                const isToday = (weekOffset === 0) && (current.toDateString() === now.toDateString());
                const isFriday = current.getDay() === 5;
                
                let colorClass = "";
                let bgClass = "";
                if (isToday) {
                    colorClass = "text-green";
                    bgClass = "bg-today";
                }
                else if (isFriday) colorClass = "text-red";

                grid.innerHTML += `
                    <div class="day-box ${bgClass}">
                        <span class="day-name ${colorClass}">${dayNames[i]}</span>
                        <span class="day-num ${colorClass}">${current.getDate()}</span>
                    </div>
                `;
            }
            
            // Fetch data for this week
            fetchWeeklyData(range.start, range.end);
        }

        function changeWeek(direction) {
            weekOffset += direction;
            updateCalendarAndFetch();
        }

        async function fetchWeeklyData(startDate, endDate) {
            document.getElementById('loader').style.display = "block";
            document.getElementById('tableBody').innerHTML = "";
            
            try {
                const { data, error } = await _supabase.from('production_logs').select('*')
                    .gte('entry_date', startDate).lte('entry_date', endDate)
                    .order('entry_date', { ascending: false });
                    
                if (!error) processData(data);
            } catch (err) { console.error(err); }
        }

        function processData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loader').style.display = "none";
            tableBody.innerHTML = "";
            let grandTotal = 0;
            const grouped = {};

            data.forEach(row => {
                const d = row.entry_date;
                if (!grouped[d]) grouped[d] = { twill:0, ds:0, crochet:0, tip:0, starch:0, fg:0 };
                grouped[d].twill += (Number(row.twill_6_1) || 0) + (Number(row.twill_6_2) || 0) + (Number(row.twill_10_2) || 0);
                grouped[d].ds += (Number(row.ds_16h_1) || 0) + (Number(row.ds_16h_2) || 0) + (Number(row.ds_48h_3) || 0);
                grouped[d].crochet += (Number(row.crochet_1) || 0) + (Number(row.crochet_2) || 0) + (Number(row.crochet_3) || 0);
                grouped[d].tip += (Number(row.tipping) || 0);
                grouped[d].starch += (Number(row.starching) || 0);
                grouped[d].fg += (Number(row.finished_goods) || 0);
                grandTotal += (Number(row.finished_goods) || 0);
            });

            Object.keys(grouped).sort().reverse().forEach(date => {
                const day = grouped[date];
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${new Date(date).getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date(date).getMonth()]}</b></td>
                        <td>${day.twill.toLocaleString()}</td>
                        <td>${day.ds.toLocaleString()}</td>
                        <td>${day.crochet.toLocaleString()}</td>
                        <td>${day.tip.toLocaleString()}</td>
                        <td>${day.starch.toLocaleString()}</td>
                        <td class="row-total">${day.fg.toLocaleString()}</td>
                    </tr>
                `;
            });
            
            document.getElementById('week_total').innerText = grandTotal.toLocaleString();
            document.getElementById('avg_total').innerText = Math.round(grandTotal / (Object.keys(grouped).length || 1)).toLocaleString();
        }

        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'pt',
                    format: 'a4'
                });
                
                // Add title
                doc.setFontSize(16);
                doc.setTextColor(26, 31, 54);
                doc.text('Swiss-Bangla Trims & Accessories', 40, 40);
                
                doc.setFontSize(12);
                doc.setTextColor(212, 1, 1);
                
                // Format date range for display
                const range = getWeekRange(weekOffset);
                const formattedStart = `${range.weekStart.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][range.weekStart.getMonth()]}`;
                const formattedEnd = `${range.weekEnd.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][range.weekEnd.getMonth()]} ${range.weekEnd.getFullYear()}`;
                
                doc.text(`Weekly Production Report (${formattedStart} - ${formattedEnd})`, 40, 60);
                
                // Generate table
                doc.autoTable({ 
                    html: '#reportTable', 
                    startY: 80, 
                    headStyles: { fillColor: [26, 31, 54] },
                    styles: { fontSize: 9, cellPadding: 8 },
                    margin: { left: 40, right: 40 }
                });
                
                doc.save(`Weekly_Report_${new Date().toLocaleDateString()}.pdf`);
                
            } catch (error) {
                console.error('PDF generation error:', error);
                alert('Unable to generate PDF. Please try again.');
            }
        }

        // Initialize with current week
        window.onload = () => {
            weekOffset = 0;
            updateCalendarAndFetch();
        };
    </script>
</body>
</html>
