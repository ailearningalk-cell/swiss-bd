<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss-Bangla | Weekly Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --brand: #1a1f36;
            --primary: #4285f4;
            --success: #34a853;
            --danger: #ff4b2b;
            --bg: #fdfdfd;
            --text-dark: #1a1f36;
            --text-light: #697386;
            --card-border: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .header-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .header-wrapper h1 { font-size: 24px; margin: 0; color: var(--text-dark); }
        .back-link { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }

        /* --- Uniform Card Sizing (180px Height) --- */
        .uniform-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            height: 180px; /* Fixed Height for Symmetry */
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }

        /* --- Calendar Strip --- */
        .calendar-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-box { display: flex; flex-direction: column; align-items: center; }
        .day-name { font-size: 11px; font-weight: 700; color: var(--text-light); }
        .day-num { font-size: 16px; font-weight: 800; margin-top: 4px; color: var(--text-dark); }

        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }

        /* --- Stats Row --- */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 18px; border-radius: 18px; border: 1px solid var(--card-border); }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 800; margin-top: 5px; color: var(--brand); }

        /* --- Main Data Table (Scrollable) --- */
        .table-card {
            background: #fff; border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { 
            background: #fcfdfe; padding: 12px; text-align: left; 
            font-size: 10px; font-weight: 700; color: var(--text-light);
            border-bottom: 1px solid var(--card-border); text-transform: uppercase;
        }
        td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid #f8f9fb; color: var(--text-dark); }
        .row-total { font-weight: 800; color: var(--primary); text-align: right; }

        /* --- Footer Button --- */
        .footer-actions { width: 100%; display: flex; justify-content: flex-end; padding-bottom: 40px; }
        .btn-pdf {
            background: var(--brand); color: white; border: none;
            padding: 12px 24px; border-radius: 12px; font-weight: 600;
            cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .loading { padding: 40px; text-align: center; color: var(--text-light); font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-wrapper">
            <h1>Weekly Report</h1>
            <a href="home.html" class="back-link">Dashboard</a>
        </div>

        <div class="uniform-card">
            <span class="calendar-label">Current Work Week</span>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Total Output</span>
                <div id="week_total" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Avg</span>
                <div id="avg_total" class="stat-val" style="color: var(--success)">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Twill</th>
                            <th>Draw</th>
                            <th>Croc</th>
                            <th>Tip</th>
                            <th>Starch</th>
                            <th style="text-align: right;">Total FG</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader" class="loading">Loading records...</div>
        </div>

        <div class="footer-actions">
            <button class="btn-pdf" onclick="generatePDF()">Download PDF</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ejntepmlgyliufsjttut.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnRlcG1sZ3lsaXVmc2p0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODczMDksImV4cCI6MjA4ODE2MzMwOX0.JhM2Th0IAAAtrYsDwdzF4qNOiKSXEt8odm0x0WWz8wk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function setupCalendar() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const sunDate = new Date(now);
            sunDate.setDate(now.getDate() - dayOfWeek);

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            const dayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
            
            for (let i = 0; i < 7; i++) {
                const current = new Date(sunDate);
                current.setDate(sunDate.getDate() + i);
                const isToday = current.toDateString() === now.toDateString();
                const isFriday = current.getDay() === 5;
                
                let colorClass = "";
                if (isToday) colorClass = "text-green";
                else if (isFriday) colorClass = "text-red";

                grid.innerHTML += `
                    <div class="day-box">
                        <span class="day-name ${colorClass}">${dayNames[i]}</span>
                        <span class="day-num ${colorClass}">${current.getDate()}</span>
                    </div>
                `;
            }
            // Sat-Thu Window Logic
            const satDate = new Date(sunDate); satDate.setDate(sunDate.getDate() - 1);
            const thursDate = new Date(sunDate); thursDate.setDate(sunDate.getDate() + 4);
            return { start: satDate.toISOString().split('T')[0], end: thursDate.toISOString().split('T')[0] };
        }

        async function fetchWeeklyData() {
            const range = setupCalendar();
            try {
                const { data, error } = await _supabase.from('production_logs').select('*')
                    .gte('entry_date', range.start).lte('entry_date', range.end)
                    .order('entry_date', { ascending: false });
                if (!error) processData(data);
            } catch (err) { console.error(err); }
        }

        function processData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loader').style.display = "none";
            tableBody.innerHTML = "";
            let grandTotal = 0;
            const grouped = {};

            data.forEach(row => {
                const d = row.entry_date;
                if (!grouped[d]) grouped[d] = { twill:0, ds:0, crochet:0, tip:0, starch:0, fg:0 };
                grouped[d].twill += (Number(row.twill_6_1) || 0) + (Number(row.twill_6_2) || 0) + (Number(row.twill_10_2) || 0);
                grouped[d].ds += (Number(row.ds_16h_1) || 0) + (Number(row.ds_16h_2) || 0) + (Number(row.ds_48h_3) || 0);
                grouped[d].crochet += (Number(row.crochet_1) || 0) + (Number(row.crochet_2) || 0) + (Number(row.crochet_3) || 0);
                grouped[d].tip += (Number(row.tipping) || 0);
                grouped[d].starch += (Number(row.starching) || 0);
                grouped[d].fg += (Number(row.finished_goods) || 0);
                grandTotal += (Number(row.finished_goods) || 0);
            });

            Object.keys(grouped).sort().reverse().forEach(date => {
                const day = grouped[date];
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${new Date(date).getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date(date).getMonth()]}</b></td>
                        <td>${day.twill.toLocaleString()}</td>
                        <td>${day.ds.toLocaleString()}</td>
                        <td>${day.crochet.toLocaleString()}</td>
                        <td>${day.tip.toLocaleString()}</td>
                        <td>${day.starch.toLocaleString()}</td>
                        <td class="row-total">${day.fg.toLocaleString()}</td>
                    </tr>
                `;
            });
            document.getElementById('week_total').innerText = grandTotal.toLocaleString();
            document.getElementById('avg_total').innerText = Math.round(grandTotal / (Object.keys(grouped).length || 1)).toLocaleString();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            doc.text("Swiss-Bangla Production Report", 40, 50);
            doc.autoTable({ html: '#reportTable', startY: 70, headStyles: { fillColor: [26, 31, 54] } });
            doc.save(`Production_Weekly_${new Date().toLocaleDateString()}.pdf`);
        }

        window.onload = fetchWeeklyData;
    </script>
</body>
</html>
